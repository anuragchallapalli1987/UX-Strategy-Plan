add('p4','Pillars','P4 · UX Strategy','Metrics, mapping, and design ROI',`
<span class="tag">Pillar 4</span>
<h1>UX Strategy</h1>
<p>Strategy is choosing what <em>not</em> to do. These frameworks turn taste into defensible bets.</p>
<table>
<tr><th>Framework</th><th>Use it to…</th></tr>
<tr><td>North-star metric + tree</td><td>Pick the one number that proxies delivered value, then decompose it into the inputs design can move.</td></tr>
<tr><td>HEART (Google)</td><td>Map Happiness, Engagement, Adoption, Retention, Task success to Goals-Signals-Metrics.</td></tr>
<tr><td>AARRR (pirate metrics)</td><td>Diagnose the funnel: Acquisition→Activation→Retention→Referral→Revenue; find the leak.</td></tr>
<tr><td>Wardley mapping</td><td>See where components sit on the evolution axis (genesis→commodity) to decide build/buy/differentiate.</td></tr>
<tr><td>OKRs → design outcomes</td><td>Translate objectives into design-owned key results expressed as user outcomes, not outputs.</td></tr>
<tr><td>Design ROI model</td><td>Direct / indirect / strategic value tiers (see P11 CEO·revenue).</td></tr>
<tr><td>Design debt accounting</td><td>Log inconsistency/UX debt like tech debt; pay down deliberately.</td></tr>
</table>
<h4>Strategy playbook varies by business model</h4>
<p>SaaS optimizes activation→retention→expansion (NRR is the king metric). Marketplaces balance two-sided liquidity. Platforms optimize ecosystem coherence and developer experience. Regulated industries optimize trust and error-reduction over conversion. Hardware-coupled products optimize the out-of-box experience and the physical-digital seam.</p>
${T('Scale & platform','Sundar Pichai','At platform scale, your strategy metric must survive a billion users — vanity engagement metrics actively mislead. Choose a north-star that breaks if you harm users (e.g., long-term retained value), not one that rewards dark patterns.')}
${D('Andy Jassy','"North-star metrics drift into worship. The customer doesn\'t care about your metric. Work backwards from their job; the metric is a thermometer, not the patient."')}
${GAP("Draw the north-star metric tree for your product at Providence: the top metric, the 3–4 input metrics design influences, and the specific design levers under each. Present it as the spine of a quarterly design strategy.")}
`);

/* ---------- PILLAR 5 ---------- */
add('p5','Pillars','P5 · UI Design & Visual Craft','Grid, type, color, motion, systems',`
<span class="tag">Pillar 5</span>
<h1>UI Design & Visual Craft</h1>
<p>Craft is not decoration — it is the precision that makes intent legible. Mastery spans grid systems, typographic rhythm, perceptual color, and choreographed motion.</p>
<h3>The craft stack</h3>
<ul>
<li><b>Grid & layout:</b> baseline grids, 4/8px spacing systems, responsive vs. adaptive vs. fluid, density modes (comfortable/compact for data-dense enterprise).</li>
<li><b>Typography:</b> vertical rhythm, modular scale, optical sizing, variable fonts, measure (~66ch), hierarchy through size/weight/space — not color alone.</li>
<li><b>Color:</b> perceptual spaces (OKLCH/LCH) over HSL for predictable lightness; WCAG contrast math (4.5:1 body, 3:1 large/UI); semantic tokens over raw hex; dark-mode engineering (don't invert — re-derive).</li>
<li><b>Motion:</b> Disney's 12 principles, Material motion (shared-axis, container transform), Apple's choreography; motion should explain causality and continuity, never decorate. Respect <code>prefers-reduced-motion</code>.</li>
<li><b>Iconography & illustration systems:</b> consistent stroke, grid, metaphor; systematized not bespoke.</li>
</ul>
<h3>Design system comparison</h3>
<table>
<tr><th>System</th><th>Owner</th><th>Signature</th><th>Best for</th></tr>
<tr><td>Material 3</td><td>Google</td><td>Dynamic color, tonal palettes, expressive</td><td>Cross-platform consumer, Android</td></tr>
<tr><td>Fluent 2</td><td>Microsoft</td><td>Depth, acrylic, cross-platform tokens</td><td>Enterprise + consumer convergence</td></tr>
<tr><td>HIG</td><td>Apple</td><td>Deference, clarity, platform-native</td><td>Premium native Apple-platform apps</td></tr>
<tr><td>Carbon</td><td>IBM</td><td>Data-dense, enterprise rigor</td><td>Complex B2B/data products</td></tr>
<tr><td>Polaris</td><td>Shopify</td><td>Merchant-task clarity</td><td>Commerce admin</td></tr>
<tr><td>Lightning</td><td>Salesforce</td><td>Token-driven, extreme configurability</td><td>Multi-tenant enterprise platforms</td></tr>
</table>
${T('Premium craft','Tim Cook','Craft is where trust is won or lost in the first 50ms. Sloppy contrast and janky motion tell the user you don\'t sweat details — and if you don\'t sweat the visible details, why would they trust you with their data?')}
${D('Elon Musk','"Craft can metastasize into polish theater. If the team spends a week on icon corner radii while the core flow has three dead-ends, the priorities are inverted. Craft serves the function or it\'s vanity."')}

<h2>AI-native design tooling (2026): Figma Make · Google Stitch · Claude</h2>
<p>The prompt-to-UI tools have crossed from toy to production. The skill is no longer "can you operate the tool" — it's <em>knowing what each is for, how to feed it your design system, and where it fails</em>. Treat them as a pipeline, not rivals.</p>
<div class="matrix-wrap"><table>
<tr><th>Tool</th><th>What it is</th><th>Best at</th><th>Design-system hook</th><th>Where it fails</th></tr>
<tr><td><b>Figma Make</b></td><td>Prompt-to-app inside Figma; generates working code under the hood (GA July 2025, launched Config 2025)</td><td>Turning an existing Figma library into interactive, coded prototypes; staying on-brand</td><td>Pull styling context from your Figma library + written guidelines so output adheres to your system</td><td>Net-new visual invention; complex state logic; it leans on what your library already encodes</td></tr>
<tr><td><b>Google Stitch</b></td><td>AI-native canvas (Google Labs, I/O 2025; v2 March 2026): text/image → responsive UI + front-end code, Gemini 2.5 Flash/Pro</td><td>Fast 0→1 exploration, multi-screen flows (up to 5), sketch/screenshot → UI, HTML/CSS + Figma export</td><td>Increasingly design-system aware; export to Figma to reconcile with your tokens</td><td>Generation caps; fidelity drift from your system; needs reconciliation before it's "real"</td></tr>
<tr><td><b>Claude (Artifacts + Code)</b></td><td>Conversational generation of live HTML/React artifacts and code-level scaffolds</td><td>Logic-bearing prototypes, design-system <em>code</em> (tokens, components), critique, documentation</td><td>Load your token taxonomy + component specs as project context; it generates against them</td><td>Pixel-level visual polish; it's a reasoning+code partner, not a visual canvas</td></tr>
</table></div>
<h3>The leveraged workflow (how to actually use them)</h3>
<ol>
<li><b>Diverge in Stitch.</b> Generate many directions from a prompt or a sketch; this is your Crazy-8s at machine speed. Pick a direction, don't ship the pixels.</li>
<li><b>Converge in Figma + Figma Make.</b> Bring the direction into your real library; use Make to produce an interactive, on-system coded prototype you can user-test in the first session.</li>
<li><b>Systematize with Claude.</b> Turn the chosen patterns into <em>durable system assets</em>: a token taxonomy (OKLCH semantic tokens), component specs, and the actual component code (React/Tailwind, Web Components) — versioned, documented, accessible by default.</li>
<li><b>Govern.</b> Every AI-generated component goes through the same contribution review as a human one (see P10/P11-CTO federated governance). AI raises the floor of output volume; governance keeps the ceiling of quality.</li>
</ol>
<h3>Building a design system in the AI era</h3>
<p>The strategic shift Figma named at Schema 2025: a design system is no longer just a shared language for humans — it's <strong>the translation layer AI needs to understand your design and produce on-brand code</strong>. That reframes your priorities: invest in <em>machine-legible</em> system assets. Semantic tokens (not raw hex), documented usage rules, and component contracts become the prompt context that makes every AI tool produce <em>your</em> product instead of generic Material. A weak system means AI amplifies inconsistency; a strong system means AI amplifies your brand. The token taxonomy is now your highest-leverage artifact.</p>
${T('Velocity + integration','Elon Musk','First-principles: the bottleneck was never drawing rectangles — it was the loop from intent to tested experience. These tools collapse that loop to minutes. The designers who win treat generation as free and spend all their judgment on the rubric and the system that constrains it.')}
${D('Tim Cook','"Speed without craft governance is how you ship a thousand inconsistent screens. AI-generated UI must pass the same accessibility and quality bar as anything else — otherwise you\'ve automated the production of debt. The premium is still in the details the model won\'t sweat for you."')}
${GAP("Take one real flow: generate three directions in Google Stitch, build the winner into your Figma library with Figma Make, then have Claude emit the token taxonomy + a production component spec with WCAG 2.2 AA baked in. Document the end-to-end pipeline as a case study — 'how I run AI-native design' is a 2026 portfolio centerpiece and a direct VP-interview asset.")}
${GAP("Rebuild one screen's color system in OKLCH with semantic tokens and prove every text pair passes WCAG 2.2 AA. Document the token taxonomy. This is the artifact that gets you taken seriously by a platform design team.")}
`);

add('p6','Pillars','P6 · Usability Testing & Evaluation','Heuristics, WCAG, metrics, statistics',`
<span class="tag">Pillar 6</span>
<h1>Usability Testing & Evaluation</h1>
<p>Evaluation is how taste becomes evidence. Know the methods, the standards, and enough statistics to not embarrass yourself.</p>
<h3>Evaluation methods</h3>
<p>Moderated vs. unmoderated; remote vs. in-person; <strong>RITE</strong> (rapid iterative testing, fix-and-retest); expert methods — heuristic evaluation (Nielsen's 10 + Shneiderman's 8 Golden Rules + Tognazzini's 16), <strong>cognitive walkthrough</strong>, and accessibility audits (WCAG 2.2 AA, the 3.0 draft direction, EN 301 549 for EU public sector).</p>
<h3>Metrics literacy</h3>
<table>
<tr><th>Metric</th><th>What it measures</th></tr>
<tr><td>SUS</td><td>Perceived usability (0–100, &gt;68 is above average)</td></tr>
<tr><td>SEQ</td><td>Single-ease-question per task (1–7)</td></tr>
<tr><td>UMUX-Lite</td><td>Short usability + value</td></tr>
<tr><td>Task success / error rate / time-on-task</td><td>Behavioral performance</td></tr>
<tr><td>NPS (product)</td><td>Loyalty proxy — useful as a trend, dangerous as a target</td></tr>
</table>
<h4>Statistical literacy (the part most designers fake)</h4>
<p>Know sample-size logic (5 users find ~85% of usability issues for <em>qualitative</em> work; statistical comparison needs far more), confidence intervals (report the range, not just the mean), effect size (significance ≠ importance), and the <strong>p-hacking traps</strong>: peeking at A/B tests, testing many metrics and reporting the winner, stopping when you like the number. Pre-register your hypothesis and your stop rule.</p>
${T('Accelerated computing','Jensen Huang','Evaluation should be continuous and instrumented, not episodic. Treat the product as a system under telemetry — but never let a dashboard substitute for watching a real human struggle for five minutes.')}
${D('Satya Nadella','"Numbers without empathy mislead. A statistically significant lift can hide that you made the experience worse for your most vulnerable users. Pair every quant result with a qual session."')}

<h2>Deep dive: the NN/g usability canon</h2>
<p>Nielsen Norman Group is the discipline's most-cited authority on evaluation; you should be able to wield its frameworks by name in any senior interview.</p>
<h3>Nielsen's 10 Usability Heuristics (the load-bearing ten)</h3>
<ol>
<li><b>Visibility of system status</b> — always show what's happening (loading, saved, progress).</li>
<li><b>Match between system and real world</b> — speak the user's language, not internal jargon.</li>
<li><b>User control and freedom</b> — clearly marked exits, undo/redo.</li>
<li><b>Consistency and standards</b> — honor platform and internal conventions (ties to Jakob's Law, P1).</li>
<li><b>Error prevention</b> — design out the error before you design the error message.</li>
<li><b>Recognition rather than recall</b> — make options visible; don't tax memory.</li>
<li><b>Flexibility and efficiency of use</b> — accelerators for experts, simplicity for novices.</li>
<li><b>Aesthetic and minimalist design</b> — every extra element competes with the relevant ones.</li>
<li><b>Help users recognize, diagnose, recover from errors</b> — plain-language, constructive errors.</li>
<li><b>Help and documentation</b> — searchable, task-focused, ideally unnecessary.</li>
</ol>
<h3>How NN/g says to run evaluation</h3>
<p>NN/g's practical doctrine: <strong>discount usability engineering</strong> — test early, test small, test often. Their famous finding that ~5 users surface the bulk of usability problems applies to <em>qualitative</em> formative testing (it does <em>not</em> license tiny samples for quantitative comparison). The method-selection logic plots techniques on three axes — <strong>attitudinal vs. behavioral</strong> (what people say vs. do), <strong>qualitative vs. quantitative</strong> (why vs. how-many), and <strong>context of use</strong> (natural, scripted, de-contextualized). Pick the method that answers the actual question. Pair heuristic evaluation (cheap, expert, no users) with empirical usability testing (users, real behavior) — they catch different classes of problem.</p>
<h2>Deep dive: the Stanford d.school approach to evaluation</h2>
<p>Stanford's <em>Hasso Plattner Institute of Design</em> contributes the <strong>empathy-first, bias-to-prototype</strong> mindset: the five modes — <strong>Empathize → Define → Ideate → Prototype → Test</strong> — treat "Test" not as a final gate but as another way to build empathy and reframe the problem. The d.school ethos for evaluation: <em>prototype to learn, not to prove</em>; show a rough artifact early because a low-fidelity prototype invites honest critique while a polished one invites politeness. "Testing" feeds straight back into "Empathize" and even "Define" — you frequently discover you were solving the wrong problem, which is a success, not a failure. The cultural lesson for a leader: build psychological safety so testing surfaces uncomfortable truths instead of flattering confirmations.</p>
<table>
<tr><th></th><th>NN/g lens</th><th>Stanford d.school lens</th></tr>
<tr><td>Primary goal of testing</td><td>Measure & fix usability problems</td><td>Build empathy & reframe the problem</td></tr>
<tr><td>Fidelity preference</td><td>Whatever answers the question</td><td>Deliberately rough early</td></tr>
<tr><td>Rigor</td><td>High; method-matched, statistically literate</td><td>Lighter; speed and learning over rigor</td></tr>
<tr><td>Best when</td><td>Improving a known product</td><td>Exploring an ambiguous new problem</td></tr>
</table>
${T('Customer obsession','Andy Jassy','NN/g and Stanford aren\'t rivals — they\'re different altitudes of the same obsession. Use Stanford to discover the right problem, NN/g to verify you solved it. A leader who only does one ships either polished irrelevance or rigorously-tested guesses.')}
${D('Jensen Huang','"Five users is a heuristic from a slower era. With instrumentation and simulation you can evaluate against thousands continuously — don\'t let a 1990s sample-size rule cap your evidence when telemetry is nearly free."')}
${GAP("Run a full heuristic evaluation of one of your flows against Nielsen's 10, score each finding on the 0–3 severity rubric, then validate the top three with a 5-user qualitative test. Present the NN/g-style findings report — it's the artifact that proves you evaluate like a professional, not by opinion.")}
${GAP("Take one A/B test you've seen and audit it for p-hacking: was there a pre-registered hypothesis, a stop rule, a single primary metric, and an effect size — not just a p-value? Write the corrected version. Statistical credibility is a fast way to earn CTO-level trust.")}
`);

add('p7','Pillars','P7 · AI-Augmented UX','The signature pillar — designing with and for AI',`
<span class="tag">Pillar 7</span><span class="tag">Signature</span>
<h1>AI-Augmented UX</h1>
<p>"AI" is not monolithic. This pillar names specific models, capabilities, and surfaces — and treats them as a designer's working material, not a buzzword.</p>

<h2>1 · Designing WITH AI (you as the designer)</h2>
<ul>
<li><b>Claude as research synthesizer</b> — cluster transcripts, surface themes, draft personas; you verify, never delegate judgment.</li>
<li><b>Claude as critique partner</b> — role-prime it ("act as a skeptical accessibility reviewer") to pressure-test designs before the room does.</li>
<li><b>Claude Projects</b> — load your design system, principles, and brand voice as persistent context so every output is on-system.</li>
<li><b>Claude Code</b> — scaffold real prototypes in code, not throwaway mocks; close the design-to-code gap.</li>
<li><b>Claude Skills</b> — package repeatable design-ops (audit a flow against WCAG, generate a research plan) as reusable skills.</li>
<li><b>Prompt engineering for designers</b> — chain-of-thought (ask for reasoning), role priming, constitutional/constraint prompting, and XML structuring (<code>&lt;brief&gt;…&lt;/brief&gt;</code>) for reliable outputs.</li>
</ul>

<h2>2 · Designing FOR AI (UX patterns for LLM products)</h2>
<table>
<tr><th>Pattern</th><th>Problem it solves</th></tr>
<tr><td>Chat / conversational UX</td><td>Open-ended intent; needs the "what can I ask?" onboarding (blank-prompt problem)</td></tr>
<tr><td>Agentic flows</td><td>Delegation; needs permission/consent gates and a "preview before act" step</td></tr>
<tr><td>Ambient / proactive</td><td>AI acts without prompt; needs interrupt-ability and explainability</td></tr>
<tr><td>Multimodal / voice-first</td><td>No screen affordances; needs strong feedback and confirmation</td></tr>
<tr><td>"Show your work"</td><td>Trust; expose reasoning, sources, citations</td></tr>
<tr><td>Graceful degradation</td><td>Model is uncertain/down; degrade to a usable fallback, never a dead-end</td></tr>
<tr><td>Citation & trust UI</td><td>Hallucination risk; ground claims in verifiable sources</td></tr>
<tr><td>Model selection UX</td><td>Cost/latency/quality tradeoffs surfaced to the user when relevant</td></tr>
</table>

<h2>3 · Anthropic-specific surfaces</h2>
<ul>
<li><b>Constitutional AI as a design principle</b> — explicit, inspectable values guiding behavior; the design analogue is principles-as-product, not buried policy.</li>
<li><b>Claude's behavioral patterns as UX primitives</b> — honesty about uncertainty, refusal with explanation, asking clarifying questions: design your product to mirror these.</li>
<li><b>MCP (Model Context Protocol)</b> — a standard interaction layer connecting models to tools/data; design opportunity is the consent and capability-discovery surface.</li>
<li><b>Artifacts</b> — a new content type: durable, iterable outputs alongside the chat. A genuinely new design pattern to master.</li>
<li><b>Computer Use</b> — the agent operates a UI as a surface; raises new consent, observability, and stop-control design problems.</li>
</ul>

<h2>4 · AI evaluation for UX</h2>
<p>Build evals for the <em>experience</em>, not just model accuracy. Red-team your designs (what happens with a malicious or confused prompt?). Measure AI-feature adoption and the <strong>"first session" problem</strong> — most AI features fail because the user's first attempt produces a mediocre result and they never return. Design the first session to guarantee a win.</p>

<h2>5 · Ethics & safety</h2>
<p>Bias surfaces in design (who the defaults serve), dark patterns in AI UX (manufactured urgency, false confidence, manipulative anthropomorphism), transparency requirements, the <strong>AI Bill of Rights</strong> (US blueprint), and the <strong>EU AI Act</strong> (risk tiers, transparency and human-oversight obligations that directly constrain interface design — e.g., disclosure that you're talking to AI).</p>
${T('Agentic patterns','Satya Nadella','The Copilot insight is that AI is a collaborator, not an oracle. Design the human-in-the-loop seam — the moment of review, correction, and consent — because that seam is where trust and adoption are won.')}
${D('Elon Musk','"Too much hand-holding kills the value. The point of an agent is to remove the human from the loop where the human adds nothing. Over-designing consent gates on trivial actions trains users to click through everything — which defeats the safety you intended."')}
${GAP("Take one feature you own and design its 'first session': the single guided path that guarantees the user gets a real win on attempt one, plus a graceful-degradation fallback and a 'show your work' trust element. Build it as a clickable prototype. This is the most marketable artifact you can make in 2026.")}
`);

add('p8','Pillars','P8 · PDLC: Four Operating Models','Before AI → AI+Quantum+Robotics — as operating models, not sci-fi',`
<span class="tag">Pillar 8</span>
<h1>Product Development Lifecycle: Four Operating Models</h1>
<p>Four side-by-side PDLC models. For each: what stays human, what shifts to AI/agents, what disappears, what's newly required — plus the designer's job description in that era.</p>
${eraBlock([
 {label:'1.0 Before AI',html:`
  <h3>PDLC 1.0 — Before AI (~2010–2022)</h3>
  <p>Agile/waterfall hybrid. Discovery → design → redline handoff → build → QA → ship → measure. Latency measured in weeks; design is a stage with a queue.</p>
  <table><tr><th>Stage</th><th>Owner (RACI)</th><th>Deliverable</th></tr>
  <tr><td>Discovery</td><td>PM (A), Research (R), Design (C)</td><td>PRD, research report</td></tr>
  <tr><td>Design</td><td>Design (R/A)</td><td>Wireframes → hi-fi → redlines</td></tr>
  <tr><td>Build</td><td>Eng (R/A)</td><td>Implementation</td></tr>
  <tr><td>QA/Ship</td><td>QA (R), Eng (A)</td><td>Release</td></tr></table>
  <p><b>Designer's job:</b> Produce pixel-perfect specs and shepherd them through handoff. Tooling: Sketch/Figma, InVision, Zeplin. Risk: wrong-problem discovered late; handoff loss. Time-to-market: months.</p>`},
 {label:'2.0 With AI',html:`
  <h3>PDLC 2.0 — With AI (current, ~2023–2026)</h3>
  <p>Copilots, generative research synthesis, AI-assisted prototyping, design-to-code AI, eval-driven design. The bottleneck moves from production to <em>judgment and verification</em>.</p>
  <table><tr><th>Stage</th><th>Shifts to AI</th><th>Stays human</th></tr>
  <tr><td>Discovery</td><td>Transcript synthesis, theme clustering</td><td>Choosing the question; verifying themes</td></tr>
  <tr><td>Design</td><td>Variant generation, AI critique, code scaffolding</td><td>Taste, trade-off decisions, system coherence</td></tr>
  <tr><td>Build</td><td>Design-to-code first pass</td><td>Architecture, performance, edge cases</td></tr>
  <tr><td>Evaluate</td><td>Automated eval harness, A/B analysis</td><td>Defining what "good experience" means</td></tr></table>
  <p><b>Newly required:</b> prompt fluency, eval design, AI-output verification. <b>Disappears:</b> manual redlining, throwaway hi-fi mocks. <b>Designer's job:</b> Curator-director of AI output and owner of judgment + trust surfaces. Time-to-market: days–weeks.</p>`},
 {label:'3.0 AI+Quantum',html:`
  <h3>PDLC 3.0 — AI + Quantum (~2027–2032, operating model)</h3>
  <p>Quantum-assisted optimization makes vast design search spaces tractable — layout, pricing, routing, and materially new categories (molecular-design UX, post-quantum cryptographic UX shifts). Simulation-heavy testing replaces small-sample studies.</p>
  <table><tr><th>Capability</th><th>Operating change</th></tr>
  <tr><td>Combinatorial optimization</td><td>Designer curates a Pareto frontier of computed options instead of authoring one comp</td></tr>
  <tr><td>Simulation at scale</td><td>Experiences validated against simulated populations before any real user touches them</td></tr>
  <tr><td>Crypto-UX shift</td><td>Post-quantum security changes trust/identity flows; new consent and key-management UX</td></tr></table>
  <p><b>Stays human:</b> defining the objective function and the values it optimizes for (a deeply ethical, design-led act). <b>Newly required:</b> literacy in optimization objectives, simulation validity. <b>Designer's job:</b> Objective-function author and frontier curator. <em>Operating-model caveat: treat quantum advantage as bounded to specific optimization classes, not magic.</em></p>`},
 {label:'4.0 +Robotics',html:`
  <h3>PDLC 4.0 — AI + Quantum + Robotics (~2030+)</h3>
  <p>Embodied AI, physical-digital twins, robot-teaming UX, ambient computing as default, UX for autonomous systems — the disappearing interface.</p>
  <table><tr><th>Surface</th><th>Design problem</th></tr>
  <tr><td>Embodied agents</td><td>Behavior policy + stop/override + intent signaling (motion, light, sound)</td></tr>
  <tr><td>Physical-digital twin</td><td>Design and test in simulation against a synced real-world twin</td></tr>
  <tr><td>Robot teaming</td><td>Trust calibration, handoff between human and machine, legibility of machine intent</td></tr>
  <tr><td>Ambient default</td><td>No screen; the design artifact is a behavior, not a layout</td></tr></table>
  <p><b>Disappears:</b> the screen as the default surface. <b>Newly required:</b> behavior design, safety-critical UX, multi-agent choreography. <b>Designer's job:</b> Behavior architect for autonomous systems where a design mistake has physical consequences.</p>`}
])}
${T('Full-stack reasoning','Jensen Huang','Each era pulls the designer closer to the system and the simulation. The designer who can\'t reason about the full stack — model, data, latency, physics — becomes a decorator of someone else\'s decisions.')}
${D('Tim Cook','"Don\'t let the future-era excitement erode the present discipline. In healthcare and other regulated spaces, PDLC 2.0 craft and rigor still ship the product that pays the bills. Master the era you\'re in before LARPing the one you\'re not."')}
${GAP("Map your current team's PDLC against the 2.0 table: which stages have actually shifted to AI, which are still 1.0, and where is the biggest unrealized leverage? Write the one-page transition plan. This is a VP-of-Design-caliber strategy artifact.")}
`);

add('p9','Pillars','P9 · Industry Verticals','Five deep dives with regulation, economics, and patterns',`
<span class="tag">Pillar 9</span>
<h1>Industry Verticals</h1>
<p>Each vertical is a first-class discipline with its own regulation, unit economics, and table-stakes patterns. Generic UX skills are necessary but not sufficient — domain fluency is what gets you the VP role.</p>

<details class="acc" open><summary><span>1 · Healthcare (your home turf)</span><span class="qmeta">HIPAA · FHIR · FDA SaMD</span></summary><div class="body">
<p><b>Regulation:</b> HIPAA (PHI handling, BAAs, audit trails), FHIR/HL7 interoperability standards, FDA Software-as-a-Medical-Device classification (clinical decision support can be a regulated device). <b>Personas:</b> clinicians (time-starved, alarm-fatigued), patients (anxious, varied literacy), administrators, payers. <b>Economics:</b> reimbursement-driven, not conversion-driven; the buyer (health system) ≠ the user (clinician) ≠ the beneficiary (patient).</p>
<p><b>Table-stakes patterns:</b> EHR integration (Epic/Cerner), scannable clinical data, fail-safe medication flows, accessibility for aging/impaired patients. <b>Differentiating patterns:</b> reducing documentation burden (the burnout lever), clinical decision support that earns trust without alert fatigue, telehealth that handles connectivity edge cases. <b>AI opportunity:</b> ambient clinical documentation, summarization, decision support — all gated by trust and liability. <b>KPI tree:</b> clinician time-on-task → documentation burden → burnout/retention → cost of turnover. <b>Pitfall:</b> designing for the demo, not the 2am understaffed reality.</p>
<p><b>The Providence/Epic context:</b> in a CRCA service line, the leverage is reducing the cognitive and time tax of revenue-cycle and clinical workflows that sit on top of Epic — design within the EHR's constraints while improving the seams.</p>
</div></details>

<details class="acc"><summary><span>2 · E-commerce</span><span class="qmeta">conversion · flywheel</span></summary><div class="body">
<p><b>Patterns:</b> conversion architecture, cart psychology (anchoring, scarcity used ethically), omnichannel continuity, AR try-on, personalization vs. privacy. <b>Economics:</b> conversion rate × AOV × frequency − CAC; small CR lifts are large dollars. <b>Amazon's flywheel mapped to UX:</b> lower prices/selection → more customers → more sellers → more selection → lower cost structure → repeat; design decisions (1-Click, reviews, Prime) each accelerate a loop. <b>Pitfall:</b> dark patterns that lift this quarter and erode LTV. <b>AI:</b> conversational shopping, personalized merchandising, returns-reduction via better fit guidance.</p>
</div></details>

<details class="acc"><summary><span>3 · IT Services / Enterprise B2B</span><span class="qmeta">PLG vs sales-led · multi-tenant</span></summary><div class="body">
<p><b>Patterns:</b> dashboard design at scale, admin UX, role-based multi-tenant patterns, the "internal-tool aesthetic" problem (function over polish — but polish still signals quality to buyers). <b>Buyer dynamics:</b> sales-led (buyer ≠ user) vs. product-led growth (the product sells itself; activation UX is the GTM). <b>Economics:</b> NRR, seat expansion, time-to-value. <b>Pitfall:</b> designing for the buyer's demo checklist instead of the daily user's workflow. <b>AI:</b> natural-language querying of complex data, agentic admin tasks.</p>
</div></details>

<details class="acc"><summary><span>4 · Hospitality & Tourism</span><span class="qmeta">booking · loyalty · recovery</span></summary><div class="body">
<p><b>Patterns:</b> booking funnels (high-intent, high-anxiety), loyalty UX, on-property digital (check-in, keys, services), multilingual/multicultural design, trust signals (reviews, cancellation clarity), and <b>recovery UX</b> — how you handle cancellations and disruptions defines loyalty more than the happy path (peak-end rule applied to a business). <b>Economics:</b> perishable inventory, RevPAR, repeat/loyalty value. <b>Pitfall:</b> beautiful booking flow, abandoned recovery flow.</p>
</div></details>

<details class="acc"><summary><span>5 · Platform Products (Google/Microsoft scale)</span><span class="qmeta">1B+ users · governance</span></summary><div class="body">
<p><b>Patterns:</b> designing for 1B+ users (the long tail is the product), ecosystem coherence, cross-product design language, Material/Fluent governance, the "design council" model that arbitrates cross-product consistency. <b>Economics:</b> scale economics, ecosystem lock-in, developer-platform network effects. <b>Pitfall:</b> local optimization that fragments the ecosystem; ignoring the p99 user. <b>AI:</b> assistant layers that span products coherently.</p>
</div></details>
${T('Customer obsession','Andy Jassy','In every vertical, work backwards from the specific customer\'s job. The healthcare clinician at 2am, the merchant closing the month, the traveler whose flight just cancelled — design for that exact moment, not the persona slide.')}
${D('Sundar Pichai','"Verticals tempt you into bespoke everything. At platform scale the discipline is the opposite — find the shared primitive that serves healthcare and commerce and hospitality, and resist re-inventing per vertical."')}
${GAP("Write a one-page UX strategy for your Providence service line: the regulatory constraints, the real persona's worst moment, the one differentiating pattern, the KPI tree, and the AI opportunity gated by trust. This doubles as interview gold for any healthcare-adjacent role.")}
`);

/* ---------- PILLAR 10 ---------- */
add('p10','Pillars','P10 · Design Leadership & DesignOps','Org models, ladders, metrics, operating rhythm',`
<span class="tag">Pillar 10</span>
<h1>Design Leadership & Design Ops</h1>
<p>Leadership is leverage through people and systems. This pillar is the operating system of a design org.</p>
<h3>Org models</h3>
<table>
<tr><th>Model</th><th>Strength</th><th>Failure mode</th></tr>
<tr><td>Centralized</td><td>Consistency, strong craft bar</td><td>Ivory tower; slow; disconnected from product</td></tr>
<tr><td>Embedded</td><td>Speed, product context</td><td>Fragmentation; stalled careers; no shared system</td></tr>
<tr><td>Federated</td><td>Both — embedded + central craft/ops</td><td>Needs the center to earn its keep via leverage</td></tr>
<tr><td>Matrixed</td><td>Dual accountability</td><td>Ambiguous ownership if not RACI'd</td></tr>
</table>
<h3>Career ladder & hiring</h3>
<p>IC1 → … → Distinguished Designer, mirrored by the 8-competency Maturity Model. Hiring rubrics calibrated across interviewers; leveling matrix and calibration guide so promotion is legible and bias is reduced. Senior = judgment and scope, not tenure.</p>
<h3>Operating rhythm & ops functions</h3>
<p>1:1 cadence, skip-levels, design all-hands, portfolio reviews, the design strategy offsite. Supporting functions: <strong>DesignOps</strong> (process, tooling, rituals), <strong>ResearchOps</strong> (participant management, repositories, compliance), <strong>ContentOps</strong>, and emerging <strong>AIOps for design</strong> (managing prompts, evals, and AI tooling as shared infrastructure). Design-system governance (federated, see P5/P11-CTO). Critique culture, design reviews, and design QA as disciplines (see P11 SrDir cards).</p>
<h3>Measuring design performance</h3>
<p>Four tiers (never report activity): <strong>business</strong> (revenue, retention, NPS), <strong>product</strong> (task success, adoption, time-to-value), <strong>team</strong> (velocity, quality, morale), <strong>individual</strong> (growth, impact).</p>
${T('Empathy-led','Satya Nadella','A leader\'s job is to remove obstacles and grow people, not to be the best designer in the room. The growth-mindset move is to make your team better than you — and to make that growth legible through a ladder.')}

add('playbooks','Libraries','Problem-Solving Playbooks','Eight cross-cutting UX strategy playbooks',`
<h1>Problem-Solving Playbooks</h1>
<p>Each follows the same operating structure: <strong>Diagnose · Frame · Bet · Sequence · Measure · Adapt</strong>. Below: a worked version of the highest-leverage one for you, plus the spine of the rest.</p>
<details class="acc" open><summary><span>UX Strategy for Healthcare Transformation</span><span class="qmeta">worked</span></summary><div class="body">
<p><b>Diagnose:</b> Instrument the real constraint — usually clinician documentation burden and fragmented EHR workflows, not "the UI is ugly." Measure time-on-task and error rates in the live 2am context, not the demo.</p>
<p><b>Frame:</b> Reframe burnout as a measurable design problem (time + cognitive load) tied to retention economics. Get leadership to agree on the metric before designing.</p>
<p><b>Bet:</b> Pick the one workflow whose time-tax is highest and most-repeated; bet on reducing steps, not redecorating. Gate any AI assistance behind a trust/verification pattern given liability.</p>
<p><b>Sequence:</b> Foundational EHR-integration and accessibility work first (it unblocks everything), then the high-leverage workflow, then expand. Comply with HIPAA/FHIR as a constraint, not an afterthought.</p>
<p><b>Measure:</b> Clinician time saved → documentation burden → satisfaction/retention → turnover cost avoided. Pair quant with shadowing sessions.</p>
<p><b>Adapt:</b> Re-measure quarterly; kill AI features that fail the first-session trust bar.</p>
</div></details>
<details class="acc"><summary><span>The other seven (spines)</span><span class="qmeta">Diagnose→Adapt</span></summary><div class="body">
<ul>
<li><b>E-commerce Growth:</b> diagnose funnel leak (AARRR) → frame around the one conversion bottleneck → bet on the highest-traffic friction → sequence by traffic-weighted impact → measure CR×AOV → adapt against LTV not just this quarter.</li>
<li><b>Enterprise Digital Transformation:</b> diagnose the buyer/user gap → frame around daily-user workflow → bet on activation/time-to-value → sequence admin+core flows → measure NRR/adoption → adapt to org change resistance.</li>
<li><b>AI Product Launch (0→1):</b> diagnose the riskiest unknown (desirability of the AI value) → frame the "first session win" → bet on one guaranteed-win path + graceful degradation → sequence trust UI first → measure first-session success & return → adapt prompts as artifacts.</li>
<li><b>AI Product Scale (1→100):</b> diagnose where quality breaks at scale → frame around evals + the long tail → bet on systematized guardrails → sequence eval harness then expansion → measure adoption depth & trust → adapt to edge cases.</li>
<li><b>Regulated Industries:</b> diagnose compliance constraints → frame trust/error-reduction over conversion → bet on fail-safe flows → sequence compliance-by-design → measure error rate & audit pass → adapt to regulation changes.</li>
<li><b>Multi-Product Ecosystems:</b> diagnose incoherence cost → frame shared primitives → bet on governance model → sequence foundations then composition → measure consistency & reuse → adapt via design council.</li>
<li><b>Crisis Recovery / Turnaround:</b> diagnose root cause (clarity? partnership? talent?) → frame quick wins + durable systems → bet on the one broken mechanism → sequence listen→stabilize→change → measure morale + one visible win → adapt as trust returns (see P11 SrVP·change).</li>
</ul>
</div></details>
${GAP("Pick the playbook nearest your current work and write the full ~3000-word version using the Diagnose→Adapt spine. A complete playbook is a portfolio centerpiece that signals strategic, not just executional, range.")}
`);

/* ---------- PILLAR 12: ACCESSIBILITY ---------- */
add('p12','Pillars','P12 · Accessibility & Inclusive Design','Designing for the full range of human ability',`
<span class="tag">Pillar 12</span><span class="tag">Non-negotiable</span>
<h1>Accessibility & Inclusive Design</h1>
<p><b>Why it matters:</b> roughly 1 in 6 people live with a significant disability, and <em>everyone</em> is situationally or temporarily disabled (bright sun, broken arm, holding a baby, noisy train). Accessibility is not a compliance tax — it is design for the real distribution of human ability, and at scale it is also legal exposure (ADA, Section 508, EN 301 549, the European Accessibility Act effective 2025). Design it into the system once (P5, P11-CTO) and every feature inherits it; bolt it on later and pay 5–10x forever.</p>

<h2>Design for each disability category</h2>
<table>
<tr><th>Category</th><th>Who</th><th>Barriers</th><th>Design moves</th><th>Assistive tech</th></tr>
<tr><td><b>Visual</b></td><td>Blind, low-vision, color-blind</td><td>Can't see UI, low contrast, color-only meaning</td><td>Semantic HTML + ARIA; logical heading order; alt text; 4.5:1 contrast; never color alone; support zoom to 200%+; visible focus</td><td>Screen readers (JAWS, NVDA, VoiceOver, TalkBack), magnifiers, braille displays</td></tr>
<tr><td><b>Motor / dexterity</b></td><td>Tremor, paralysis, limited fine motor, RSI</td><td>Can't use precise mouse, small targets, time limits</td><td>Large targets (≥24×44px), full keyboard operability, no time traps, generous click areas, avoid drag-only or hover-only actions</td><td>Switch access, voice control, eye-tracking, adapted keyboards</td></tr>
<tr><td><b>Auditory</b></td><td>Deaf, hard of hearing</td><td>Audio-only content, no captions</td><td>Captions + transcripts for all media; visual alternatives to audio alerts; don't rely on sound for critical feedback</td><td>Captioning, hearing aids, sign language</td></tr>
<tr><td><b>Speech</b></td><td>Non-verbal, speech differences</td><td>Voice-only interfaces</td><td>Always offer a non-voice path; text alternatives to voice commands</td><td>AAC devices, text input</td></tr>
<tr><td><b>Cognitive / neurological</b></td><td>Dyslexia, ADHD, autism, memory, learning differences</td><td>Complex language, dense layouts, distraction, memory load</td><td>Plain language; clear hierarchy; recognition over recall (P1); consistent patterns; reduce distraction; chunk; forgiving errors; allow reduced motion</td><td>Reading tools, text-to-speech, simplification</td></tr>
<tr><td><b>Vestibular / photosensitive</b></td><td>Motion sensitivity, seizure risk</td><td>Parallax, autoplay motion, flashing</td><td>Respect <code>prefers-reduced-motion</code>; no content flashing &gt;3×/sec; pausable animation</td><td>OS motion settings</td></tr>
</table>

<h2>The POUR mental model (WCAG's spine)</h2>
<p>WCAG organizes everything under four principles: <strong>Perceivable</strong> (users can perceive the content — contrast, alt text, captions), <strong>Operable</strong> (they can operate it — keyboard, time, no seizures, navigable), <strong>Understandable</strong> (readable, predictable, error-tolerant), <strong>Robust</strong> (works with assistive tech — valid semantic markup). WCAG 2.2 AA is the practical target; the 3.0 draft moves toward an outcome-based scoring model. Memorize POUR — it's the framework you reason with when there's no checklist.</p>

<h2>Inclusive design ≠ accessibility (but contains it)</h2>
<p>Microsoft's Inclusive Design principles reframe the work: <strong>recognize exclusion</strong>, <strong>solve for one, extend to many</strong> (the "persona spectrum" — permanent / temporary / situational: one-arm amputee / broken arm / new parent holding a baby all need one-handed use), and <strong>learn from diversity</strong>. The curb-cut effect is the business case: curb cuts built for wheelchairs help strollers, luggage, and delivery carts. Captions built for deaf users serve everyone in a noisy gym. Accessible design is better design for all — that's the argument that wins budget.</p>

<h2>Operationalizing it (so it actually ships)</h2>
<ul>
<li><b>Shift left:</b> a11y acceptance criteria in the design spec and the definition of done, not a pre-launch audit.</li>
<li><b>Automate the floor:</b> axe-core / Lighthouse in CI catches ~30–40% of issues automatically.</li>
<li><b>Manual for the rest:</b> keyboard-only pass, screen-reader pass (VoiceOver/NVDA), zoom + reflow test. Automation can't judge whether alt text is <em>meaningful</em>.</li>
<li><b>Test with disabled users:</b> nothing about us without us — recruit participants who use assistive tech.</li>
<li><b>System-level:</b> bake focus management, semantics, and ARIA into the component library so product teams inherit accessibility for free.</li>
</ul>
${T('Accessibility as non-negotiable','Tim Cook','Accessibility is a human right, and we regard it as a core part of craft, not a feature. The teams that treat it as optional reveal exactly how seriously they take their users. Design for the edges and the center takes care of itself.')}
${D('Elon Musk','"Don\'t let compliance checklists become the goal. WCAG conformance is the floor, not the ceiling — a technically-conformant page can still be miserable to use with a screen reader. Optimize for the actual experience of the assistive-tech user, then the audit passes as a byproduct."')}
${GAP("Run a keyboard-only + screen-reader pass on one flow you own, log every barrier against POUR and WCAG 2.2 AA with the 0–3 severity rubric, and write the persona-spectrum (permanent/temporary/situational) for your product. An accessibility audit you led is concrete evidence of senior craft and risk-awareness in any Fortune-50 interview.")}
`);

add('platforms','Libraries','Platform UX Playbooks','Best practices per build platform — React to Power Apps',`
<h1>Platform UX Playbooks</h1>
<p>The same UX principles express differently on each platform because each imposes its own constraints, component model, and user expectations. Below: the UX approach, best practices, and the trap for each. A companion Word document with the full learning material accompanies this section.</p>

<details class="acc" open><summary><span>React (SPA / design-system apps)</span><span class="qmeta">component-driven</span></summary><div class="body">
<p><b>UX approach:</b> component-driven design that maps 1:1 to a design system; tokens → primitives → composed components. <b>Best practices:</b> build accessible primitives once (focus management, ARIA, keyboard) and reuse; manage loading/empty/error/edge states explicitly (they're real screens, not afterthoughts); code-split and lazy-load to protect LCP/INP perf budgets; use Storybook as the design-eng contract; prefer CSS/transform animation over JS. <b>Trap:</b> client-side rendering tanks first-paint and SEO — use SSR/streaming (Next.js) for content; and "div soup" destroys accessibility, so use semantic elements.</p>
</div></details>
<details class="acc"><summary><span>Angular (enterprise SPA)</span><span class="qmeta">opinionated, large apps</span></summary><div class="body">
<p><b>UX approach:</b> structured, enterprise-scale apps; lean on Angular Material (Material 3) or a corporate system for consistency. <b>Best practices:</b> use the CDK a11y module for focus/live-announcements; lazy-load feature modules for perf; strong form UX with reactive forms + inline validation; consistent state/loading patterns. <b>Trap:</b> heavy bundles and over-engineered abstractions hurt perceived performance; don't let framework ceremony bury the user task.</p>
</div></details>
<details class="acc"><summary><span>Microsoft 365 / Office add-ins</span><span class="qmeta">Fluent 2</span></summary><div class="body">
<p><b>UX approach:</b> design <em>within</em> the host app — your add-in must feel like part of Word/Excel/Outlook. Use <b>Fluent 2</b> and Fluent UI React components. <b>Best practices:</b> respect the task pane's narrow width and the host's theming (dark/high-contrast inherited); minimize chrome; match Office interaction patterns; honor the user's existing muscle memory (Jakob's Law). <b>Trap:</b> building an "app inside an app" with its own foreign UI breaks the continuity users expect and feels bolted-on.</p>
</div></details>
<details class="acc"><summary><span>SharePoint intranet</span><span class="qmeta">governance + IA</span></summary><div class="body">
<p><b>UX approach:</b> intranets live or die on <b>information architecture and findability</b>, not visuals. Use SPFx web parts + Fluent; modern communication/hub site patterns. <b>Best practices:</b> invest in IA (card sort + tree test, P3/P6); strong global nav and search scopes; governance to prevent sprawl; metadata-driven content; mobile-responsive web parts; accessible by default for a diverse internal workforce. <b>Trap:</b> letting every department build its own page design — the "intranet aesthetic" chaos (P9 IT Services). Govern templates centrally.</p>
</div></details>
<details class="acc"><summary><span>Power BI (dashboards / analytics)</span><span class="qmeta">data viz</span></summary><div class="body">
<p><b>UX approach:</b> dashboard UX is <em>information design</em> — answer the decision-maker's question at a glance. <b>Best practices:</b> top-task first (most-important KPI top-left, F-pattern); pre-attentive attributes (position, length) over pie charts; consistent color semantics; progressive disclosure via drill-through; accessible color + data tables for screen readers; performance (limit visuals per page, optimize the model). <b>Trap:</b> "dashboard vomit" — cramming every metric. Design for a decision, not for completeness.</p>
</div></details>
<details class="acc"><summary><span>Dynamics 365 (model-driven CRM/ERP)</span><span class="qmeta">enterprise workflow</span></summary><div class="body">
<p><b>UX approach:</b> optimize the daily power-user's <em>workflow efficiency</em>, not first-time delight. Model-driven apps inherit the Unified Interface; customize forms, views, and business process flows. <b>Best practices:</b> reduce clicks on the highest-frequency task; surface the right fields per role (form tailoring); use business process flows to guide multi-step work; keyboard efficiency; sensible defaults. <b>Trap:</b> exposing the full data model to every user — role-based view design is the craft. Over-customization creates upgrade debt.</p>
</div></details>
<details class="acc"><summary><span>WordPress (sites / content)</span><span class="qmeta">content + theme</span></summary><div class="body">
<p><b>UX approach:</b> content-first; the block (Gutenberg) editor and theme system shape the experience. <b>Best practices:</b> design a reusable block/pattern library so non-designers stay on-brand; performance (image optimization, caching, minimal plugins — each plugin is perf + security risk); accessibility-ready themes; clear content hierarchy and CTAs; mobile-first. <b>Trap:</b> plugin bloat and page-builder sprawl that wreck performance and consistency; govern the pattern library.</p>
</div></details>
<details class="acc"><summary><span>Kajabi (course / creator platform)</span><span class="qmeta">conversion + learning</span></summary><div class="body">
<p><b>UX approach:</b> two jobs — <em>convert</em> (landing/sales pages, funnels, checkout) and <em>retain/educate</em> (course consumption, progress). <b>Best practices:</b> conversion architecture on sales pages (clear value, social proof, frictionless checkout — P9 E-commerce); learning UX with clear progress, bite-sized modules, completion cues (peak-end, P1); mobile consumption; reduce drop-off between purchase and first lesson (the "first session" problem, P7). <b>Trap:</b> beautiful sales page, neglected learning experience that kills renewals and referrals.</p>
</div></details>
<details class="acc"><summary><span>Mobile apps — Native vs Hybrid</span><span class="qmeta">HIG + Material</span></summary><div class="body">
<p><b>UX approach:</b> respect platform conventions — <b>Apple HIG</b> on iOS, <b>Material</b> on Android (navigation, gestures, system back, typography). <b>Native</b> (Swift/Kotlin) = best performance, full platform-feature/accessibility access, platform-true feel. <b>Hybrid</b> (React Native, Flutter, Capacitor) = shared codebase, faster/cheaper, but watch performance, platform-feel fidelity, and accessibility parity. <b>Best practices either way:</b> thumb-zone ergonomics, large touch targets, offline/poor-network states, respect safe areas and OS settings (Dynamic Type, reduced motion), platform-native a11y (VoiceOver/TalkBack). <b>Trap:</b> a single design forced identically onto both platforms feels alien on both; adapt per platform.</p>
</div></details>
<details class="acc"><summary><span>Power Apps (low-code business apps)</span><span class="qmeta">citizen dev + UX rescue</span></summary><div class="body">
<p><b>UX approach:</b> low-code speed without UX discipline produces functional-but-painful apps — your value is bringing real UX craft to citizen-developer output. Canvas apps (pixel control) vs. model-driven (data-structured). <b>Best practices:</b> build a shared component library + theme for consistency across an org's app sprawl; responsive containers (not fixed pixel layouts); accessible naming and tab order (often neglected in low-code); performance (delegation, minimize on-start data calls); clear task flows. <b>Trap:</b> fixed-position canvas layouts that break on other screens, and inaccessible controls — low-code makes it easy to skip a11y, so make it a standard.</p>
</div></details>
${T('Enterprise + consumer convergence','Satya Nadella','The platform is a constraint, not an excuse. Whether it\'s Power Apps or React, the user doesn\'t care about your stack — they care that the task is fast and humane. Mastery is expressing the same empathy through wildly different component models.')}
${D('Sundar Pichai','"Honoring each platform\'s conventions is right, but don\'t fragment so far that your brand dissolves. The discipline at scale is a coherent cross-platform design language that still respects HIG and Material where it counts."')}
${GAP("Pick the two platforms you build on most (likely SharePoint/Power Platform and React at Providence) and write a one-page UX standards doc each: the component library approach, the accessibility baseline, the perf budget, and the top-three platform-specific traps. Org-level standards docs are exactly what a UX Architect produces.")}
`);

/* ============ RENDERER ============ */
const groups = ['Start','Pillars','Libraries'];
const viewed = new Set();
let current = location.hash.slice(1) || 'home';

function buildNav(filter=''){
  const f = filter.toLowerCase();
  const nav = document.getElementById('nav'); nav.innerHTML='';
  groups.forEach(g=>{
    const items = SECTIONS.filter(s=>s.group===g &&
      (!f || (s.title+s.sub+s.html).toLowerCase().includes(f)));
    if(!items.length) return;
    const gl=document.createElement('div');gl.className='navgroup';gl.textContent=g;nav.appendChild(gl);
    items.forEach(s=>{
      const a=document.createElement('a');a.className='navlink'+(s.id===current?' active':'');
      a.innerHTML=`${s.title}<br><small>${s.sub||''}</small>`;
      a.onclick=()=>go(s.id);
      nav.appendChild(a);
    });
  });
}
function go(id){
  current=id; location.hash=id; viewed.add(id);
  const s=SECTIONS.find(x=>x.id===id)||SECTIONS[0];
  document.getElementById('content').innerHTML=s.html;
  document.getElementById('crumbs').textContent=s.group+' / '+s.title;
  document.getElementById('side').classList.remove('open');
  window.scrollTo(0,0);
  buildNav(document.getElementById('search').value);
  renderXref(id);
  if(id==='mat') renderAssessor();
  const pct=Math.round(viewed.size/SECTIONS.length*100);
  document.getElementById('progbar').style.width=pct+'%';
}
function prevNext(d){
  const i=SECTIONS.findIndex(s=>s.id===current);
  const n=(i+d+SECTIONS.length)%SECTIONS.length; go(SECTIONS[n].id);
}
const XREF={
  home:['ia','mat','p11'], ia:['mat','p5'], mat:['p11','p10'],
  p1:['p2','p5','p7'], p2:['p3','p4','p8'], p3:['p4','p6','p7'],
  p4:['p9','p10','p2'], p5:['p1','p6','p10'], p6:['p3','p7','p4'],
  p7:['p8','p6','p11'], p8:['p7','p10','p9'], p9:['p4','p7','playbooks'],
  p10:['p11','p4','p8'], p11:['mat','p10','cases'],
  p12:['p5','p6','platforms'], platforms:['p5','p12','p9'],
  playbooks:['cases','vault','p4'], vault:['p11','cases','p3'],
  cases:['p11','playbooks','p9'], diagrams:['ia'], stretch:['p11','p10','mat']
};
function renderXref(id){
  const rel=(XREF[id]||[]).map(r=>{const s=SECTIONS.find(x=>x.id===r);return s?`<a onclick="go('${r}')">${s.title}</a>`:''}).filter(Boolean);
  document.getElementById('xref').innerHTML = rel.length?('<b>Related:</b> '+rel.join(' · ')):'';
}
/* maturity assessor */
const COMPS=['Craft','Research','Strategy','Systems thinking','Leadership','Communication','Business acumen','AI fluency'];
const scores={};
function renderAssessor(){
  const el=document.getElementById('assessor'); if(!el) return;
  el.innerHTML='<h3 style="margin-top:0">Self-assessment</h3>'+COMPS.map((c,ci)=>`
    <div class="mat-row"><div><b>${c}</b></div>
    <div class="mat-levels">${[1,2,3,4,5].map(l=>`<button id="m${ci}-${l}" onclick="setScore(${ci},${l})">L${l}</button>`).join('')}</div></div>
  `).join('')+`<div style="margin-top:14px;display:flex;justify-content:space-between;align-items:center">
    <span class="qmeta">Average across 8 competencies</span><span class="mat-score" id="matscore">—</span></div>
    <p class="qmeta" id="matlow"></p>`;
  COMPS.forEach((c,ci)=>{if(scores[ci])document.getElementById('m'+ci+'-'+scores[ci]).classList.add('sel')});
  updateScore();
}
function setScore(ci,l){
  scores[ci]=l;
  for(let x=1;x<=5;x++)document.getElementById('m'+ci+'-'+x).classList.toggle('sel',x===l);
  updateScore();
}
function updateScore(){
  const vals=COMPS.map((_,i)=>scores[i]).filter(Boolean);
  const sc=document.getElementById('matscore'); if(!sc)return;
  if(!vals.length){sc.textContent='—';return;}
  const avg=(vals.reduce((a,b)=>a+b,0)/vals.length);
  sc.textContent=avg.toFixed(1)+' / 5';
  if(vals.length===8){
    const min=Math.min(...vals);
    const low=COMPS.filter((_,i)=>scores[i]===min);
    document.getElementById('matlow').innerHTML=`🌉 Your lowest: <b>${low.join(', ')}</b> (L${min}). That's your quarter's focus — go to the matching pillar's Gap Bridge.`;
  }
}
function toggleTheme(){
  const h=document.documentElement;
  h.dataset.theme = h.dataset.theme==='dark'?'light':'dark';
}
document.getElementById('search').addEventListener('input',e=>buildNav(e.target.value));
window.addEventListener('hashchange',()=>{if(location.hash.slice(1)!==current)go(location.hash.slice(1))});
buildNav(); go(current);
</script>
