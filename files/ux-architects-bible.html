<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The UX Architect's Learning Bible</title>
<style>
:root{
  --bg:#0b0d12; --bg-2:#11141c; --bg-3:#171b26; --line:#252b3a;
  --ink:#e8ecf4; --ink-2:#a8b1c4; --ink-3:#6b7488;
  --brand:#7c5cff; --brand-2:#22d3ee; --gold:#f5b14c; --green:#3ddc97; --red:#ff5d73;
  --maxw:1180px; --radius:14px; --sans:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --shadow:0 10px 40px rgba(0,0,0,.45);
}
html[data-theme="light"]{
  --bg:#f6f7fb; --bg-2:#ffffff; --bg-3:#eef1f7; --line:#dde2ec;
  --ink:#11141c; --ink-2:#414b5e; --ink-3:#7c869a; --shadow:0 10px 30px rgba(20,30,60,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;
  font-size:16px;-webkit-font-smoothing:antialiased}
a{color:var(--brand-2);text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3,h4{line-height:1.2;letter-spacing:-.02em;color:var(--ink)}
h1{font-size:2.1rem;margin:.2em 0 .4em}
h2{font-size:1.5rem;margin:1.6em 0 .5em;padding-top:.4em}
h3{font-size:1.18rem;margin:1.3em 0 .4em;color:var(--ink)}
h4{font-size:1rem;margin:1.1em 0 .3em;color:var(--ink-2);text-transform:uppercase;letter-spacing:.06em;font-size:.78rem}
p{margin:.6em 0;color:var(--ink-2)}
strong{color:var(--ink)}
code{font-family:var(--mono);background:var(--bg-3);padding:.12em .4em;border-radius:6px;font-size:.86em;color:var(--brand-2)}
pre{background:var(--bg-3);border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow:auto;font-family:var(--mono);font-size:.82rem;color:var(--ink)}
ul,ol{color:var(--ink-2);padding-left:1.3em}
li{margin:.25em 0}
hr{border:none;border-top:1px solid var(--line);margin:2em 0}

/* layout */
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.side{background:var(--bg-2);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;overflow-y:auto;padding:18px 14px}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px;border-bottom:1px solid var(--line);margin-bottom:12px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;font-weight:800;color:#fff;flex:none}
.brand b{font-size:.95rem;letter-spacing:-.01em}
.brand span{display:block;font-size:.7rem;color:var(--ink-3)}
.search{width:100%;background:var(--bg-3);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:9px 12px;font-size:.85rem;margin-bottom:10px}
.search::placeholder{color:var(--ink-3)}
.navgroup{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin:14px 8px 4px}
.navlink{display:block;padding:7px 10px;border-radius:8px;font-size:.85rem;color:var(--ink-2);cursor:pointer;border:1px solid transparent}
.navlink:hover{background:var(--bg-3);text-decoration:none}
.navlink.active{background:linear-gradient(90deg,rgba(124,92,255,.18),transparent);border-color:var(--line);color:var(--ink)}
.navlink small{color:var(--ink-3);font-size:.7rem}
.main{max-width:var(--maxw);margin:0 auto;padding:36px 44px 120px;width:100%}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:8px}
.crumbs{font-size:.74rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em}
.btn{background:var(--bg-3);border:1px solid var(--line);color:var(--ink-2);border-radius:8px;padding:7px 12px;font-size:.78rem;cursor:pointer}
.btn:hover{color:var(--ink)}
.progress{height:4px;background:var(--bg-3);border-radius:4px;overflow:hidden;margin:10px 0 0}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-2));width:0}

/* components */
.tag{display:inline-block;font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--ink-3);margin-right:6px}
.callout{border:1px solid var(--line);border-left:4px solid var(--brand);background:var(--bg-2);border-radius:10px;padding:14px 18px;margin:16px 0}
.callout.titan{border-left-color:var(--gold)}
.callout.dissent{border-left-color:var(--red)}
.callout.gap{border-left-color:var(--green)}
.callout h4{margin-top:0;color:var(--gold)}
.callout.gap h4{color:var(--green)}
.callout.dissent h4{color:var(--red)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0}
.card{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.card h3{margin-top:0}
table{width:100%;border-collapse:collapse;margin:14px 0;font-size:.84rem}
th,td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
th{background:var(--bg-3);color:var(--ink);font-weight:600}
td{color:var(--ink-2)}
.toggle{display:inline-flex;border:1px solid var(--line);border-radius:24px;overflow:hidden;margin:14px 0}
.toggle button{background:var(--bg-2);border:none;color:var(--ink-3);padding:7px 14px;font-size:.76rem;cursor:pointer}
.toggle button.on{background:var(--brand);color:#fff}
.era{display:none}
.era.show{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.acc{border:1px solid var(--line);border-radius:10px;margin:10px 0;overflow:hidden;background:var(--bg-2)}
.acc>summary{cursor:pointer;padding:12px 16px;font-weight:600;list-style:none;display:flex;justify-content:space-between;gap:10px}
.acc>summary::-webkit-details-marker{display:none}
.acc>summary:hover{background:var(--bg-3)}
.acc[open]>summary{border-bottom:1px solid var(--line)}
.acc .body{padding:14px 16px}
.acc .body .lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--brand-2);margin-top:10px;font-weight:700}
.qmeta{font-size:.7rem;color:var(--ink-3)}
.hero{background:linear-gradient(135deg,rgba(124,92,255,.16),rgba(34,211,238,.08));border:1px solid var(--line);border-radius:18px;padding:34px 36px;margin-bottom:8px}
.hero h1{font-size:2.5rem;margin-top:0}
.pillargrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin:18px 0}
.pillargrid .card{cursor:pointer;transition:transform .15s,border-color .15s}
.pillargrid .card:hover{transform:translateY(-3px);border-color:var(--brand)}
.pillargrid .card .n{font-family:var(--mono);color:var(--brand);font-size:.8rem}
.matrix-wrap{overflow:auto}
/* maturity assessor */
.mat-row{display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:center;border-bottom:1px solid var(--line);padding:10px 0}
.mat-levels{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.mat-levels button{background:var(--bg-3);border:1px solid var(--line);color:var(--ink-3);border-radius:8px;padding:8px 4px;font-size:.7rem;cursor:pointer;text-align:center}
.mat-levels button.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
.mat-score{font-family:var(--mono);font-size:1.4rem;color:var(--brand-2)}
.pill-list{columns:2;column-gap:24px}
@media(max-width:880px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;z-index:50;width:280px;transform:translateX(-100%);transition:.2s}
  .side.open{transform:none}
  .main{padding:20px 18px 100px}
  .grid2{grid-template-columns:1fr}.pill-list{columns:1}
  .menu-btn{display:inline-block!important}
  .mat-row{grid-template-columns:1fr}
}
.menu-btn{display:none}
.footer{color:var(--ink-3);font-size:.78rem;border-top:1px solid var(--line);margin-top:40px;padding-top:18px}
.kbd{font-family:var(--mono);font-size:.72rem;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--ink-2)}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="side">
    <div class="brand">
      <div class="logo">UX</div>
      <div><b>The UX Architect's Bible</b><span>Operating manual for the AI-era design leader</span></div>
    </div>
    <input class="search" id="search" placeholder="Search modules, drills, questions…">
    <div id="nav"></div>
    <div class="footer">v1.0 · Council of Titans edition<br>Built for Anurag · Hyderabad</div>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="btn menu-btn" onclick="document.getElementById('side').classList.toggle('open')">☰ Menu</button>
      <div class="crumbs" id="crumbs"></div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="prevNext(-1)">← Prev</button>
        <button class="btn" onclick="prevNext(1)">Next →</button>
        <button class="btn" id="themebtn" onclick="toggleTheme()">☾ Theme</button>
      </div>
    </div>
    <div class="progress"><i id="progbar"></i></div>
    <article id="content"></article>
    <div class="footer" id="xref"></div>
  </main>
</div>
<script>
/* ============ CONTENT MODEL ============ */
const T = (lens,who,body)=>`<div class="callout titan"><h4>🏛 Titan Take — ${who} (${lens})</h4><p>${body}</p></div>`;
const D = (who,body)=>`<div class="callout dissent"><h4>⚔ Dissent — ${who}</h4><p>${body}</p></div>`;
const GAP = (body)=>`<div class="callout gap"><h4>🌉 Gap Bridge → UX Architect</h4><p>${body}</p></div>`;
const NOTE = (body)=>`<div class="callout"><p>${body}</p></div>`;

/* before/after AI toggle helper */
let eraN=0;
function eraBlock(eras){ // eras: [{label,html}...]
  const id='era'+(eraN++);
  const btns=eras.map((e,i)=>`<button class="${i==0?'on':''}" onclick="switchEra('${id}',${i},this)">${e.label}</button>`).join('');
  const panes=eras.map((e,i)=>`<div class="era ${i==0?'show':''}" data-era="${id}-${i}">${e.html}</div>`).join('');
  return `<div class="toggle">${btns}</div>${panes}`;
}
function switchEra(id,i,btn){
  document.querySelectorAll(`[data-era^="${id}-"]`).forEach((p,j)=>p.classList.toggle('show',j==i));
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
}

/* interview question accordion */
function q(meta,question,testing,trap,answer,followup,redflags){
  return `<details class="acc"><summary><span>${question}</span><span class="qmeta">${meta}</span></summary>
  <div class="body">
    <div class="lbl">What they're really testing</div><p>${testing}</p>
    <div class="lbl">The trap</div><p>${trap}</p>
    <div class="lbl">90-second model answer</div><p>${answer}</p>
    <div class="lbl">Killer follow-up to ask back</div><p>${followup}</p>
    <div class="lbl">Red flags in a weak answer</div><p>${redflags}</p>
  </div></details>`;
}

const SECTIONS = [];
const add = (id,group,title,sub,html)=>SECTIONS.push({id,group,title,sub,html});

/* ---------- HOME ---------- */
add('home','Start','The UX Architect\'s Learning Bible','A 360° operating manual for the AI-era design leader',`
<div class="hero">
  <h1>The UX Architect's Learning Bible</h1>
  <p style="font-size:1.05rem;max-width:780px">The one resource you keep open for a decade. Not a course catalog — an <strong>operating manual</strong>. Eleven pillars, every concept paired with a drill or artifact, every era treated <em>Before AI / With AI / AI+Quantum / AI+Quantum+Robotics</em>, every chapter argued through the <strong>Council of Titans</strong> and aimed at one outcome: holding your own in front of a Satya-tier leadership team next quarter.</p>
  <div style="margin-top:14px">
    <span class="tag">11 Pillars</span><span class="tag">60+ Modules</span><span class="tag">150+ Interview Qs</span><span class="tag">Artifact Vault</span><span class="tag">Maturity Model</span>
  </div>
</div>
<h2>The Council of Titans</h2>
<p>Each panelist is a <em>lens</em>, not a vote. The Bible synthesizes; where the Titans would disagree, the disagreement is surfaced and the trade-off named.</p>
<div class="grid2">
  <div class="card"><h3>Elon Musk</h3><p>First-principles reasoning, physics-grounded constraints, velocity bias, vertical integration of design + engineering. <em>"Delete the requirement before you optimize the part."</em></p></div>
  <div class="card"><h3>Tim Cook</h3><p>Operational excellence, supply-chain-to-experience continuity, privacy and accessibility as non-negotiable design primitives, premium craft.</p></div>
  <div class="card"><h3>Sundar Pichai</h3><p>Scale, AI-first thinking, platform strategy, Material philosophy, multi-product ecosystem coherence.</p></div>
  <div class="card"><h3>Satya Nadella</h3><p>Growth mindset, empathy-led strategy, enterprise+consumer convergence, Copilot/agentic patterns, inclusive design.</p></div>
  <div class="card"><h3>Andy Jassy</h3><p>Customer obsession, working-backwards (PR/FAQ), two-pizza teams, mechanism over intent, scale economics.</p></div>
  <div class="card"><h3>Jensen Huang</h3><p>Accelerated computing, simulation-first design, the "AI factory" worldview, hardware-aware full-stack reasoning.</p></div>
</div>
<h2>How to use this</h2>
<p>Three reading paths are wired into the navigation:</p>
<ul>
<li><strong>Curious mid-level designer</strong> → Foundations (P1–P6) → Maturity Model → pick one Gap Bridge per week.</li>
<li><strong>Interview-cramming senior</strong> → <a onclick="go('mat')">Maturity Model</a> self-assess → <a onclick="go('p11')">Pillar 11: Interview Mastery</a> → Portfolio Playbook → Artifact Vault.</li>
<li><strong>Leader running a 40-person org</strong> → Pillar 10 (Leadership/Ops) → Pillar 4 (Strategy) → Playbooks → PDLC operating models (Pillar 8).</li>
</ul>
${GAP("Start by self-scoring on the Maturity Model below. Your lowest two competencies become your quarter's focus. Everything else in the Bible is in service of moving those two notches.")}
`);

/* ---------- SITE ARCHITECTURE ---------- */
add('ia','Start','Site Architecture & Design Language','How the Bible is built as a product',`
<p>This deliverable is designed as a real product so it demonstrates the craft it teaches. Below: the site map, navigation model, content types, and the design system powering this very page.</p>
<h2>Site map (Pillars → Modules → Atomic Units)</h2>
<pre>
Start ─ Home · Site Architecture · Maturity Model
P1  UX Foundations & First Principles    → 6 modules (laws, perception, mental models, affordances, feedback, first-principles bridge)
P2  Design Thinking Process               → 6 methodologies + meta-framework + 12-dimension matrix
P3  UX Research                           → generative/evaluative · 25+ methods · bias inventory · ops · ethics
P4  UX Strategy                           → north-star · HEART · AARRR · Wardley · OKRs · ROI · design debt
P5  UI Design & Visual Craft              → grid · type · color/OKLCH · motion · design-system comparison
P6  Usability Testing & Evaluation        → heuristics · WCAG · metrics · statistical literacy
P7  AI-Augmented UX (Anthropic chapter)   → design WITH / FOR AI · Anthropic surfaces · evals · ethics
P8  PDLC: Four Operating Models           → 1.0 → 4.0 (Before AI → AI+Quantum+Robotics)
P9  Industry Verticals                    → Healthcare · E-comm · IT Services · Hospitality · Platforms
P10 Design Leadership & DesignOps         → org models · ladders · metrics · operating rhythm
P11 Interview Mastery                     → 150+ Qs · STAR-Plus · portfolio playbook
Libraries ─ Playbooks · Artifact Vault · Case Studies · Diagram Inventory · Stretch Goals
</pre>
<h2>Navigation & content model</h2>
<div class="grid2">
<div class="card"><h3>Navigation</h3><p>Persistent left rail grouped by Start / Pillars / Libraries; live search filters every node; prev/next ribbon for linear readers; a cross-reference graph at the foot of each page; a progress bar tracking pages viewed this session.</p></div>
<div class="card"><h3>Content types</h3><p>Concept page · Framework page · Case Study · Drill/Exercise · Template/Artifact · Interview Card (accordion) · Cheat Sheet · <strong>Titan Take</strong> callout · <strong>Dissent</strong> callout · <strong>Gap Bridge</strong>. Each renders as a reusable component you can see live on this page.</p></div>
</div>
<h2>Visual design language</h2>
<table>
<tr><th>Token</th><th>Decision</th><th>Rationale (the craft argument)</th></tr>
<tr><td>Color</td><td>Near-black canvas <code>#0b0d12</code>, violet→cyan brand, gold for Titans, green for action, red for dissent/risk</td><td>Semantic color, not decorative. A reader learns "gold = a Titan is talking, green = do this, red = danger" within one page — that is information scent (P1).</td></tr>
<tr><td>Type</td><td>Inter for UI, JetBrains Mono for artifacts/specs; tight negative tracking on headings</td><td>Mono signals "this is a template you copy," sans signals "this is prose you read." Channel separation reduces cognitive load.</td></tr>
<tr><td>Spacing</td><td>4px base grid, generous vertical rhythm, 1180px measure cap</td><td>Long-form reading demands a constrained measure (~70ch) and vertical rhythm; we eat our own dog food.</td></tr>
<tr><td>Components</td><td>Callout, comparison matrix, era-toggle, accordion, maturity assessor, pillar grid</td><td>A bounded component inventory = a design system. Adding a 7th component type should require justification.</td></tr>
</table>
<h4>Component inventory the site requires</h4>
<ul>
<li>Framework diagram block · Comparison matrix · <strong>Before/After-AI toggle</strong> (live below) · Decision tree · Interview Q&A accordion · Maturity rubric/assessor · Titan callout · Severity/rubric table · Code/template block · Progress + cross-ref graph.</li>
</ul>
<p>Live example of the era-toggle component used throughout:</p>
${eraBlock([
  {label:'Before AI',html:'<p>Wireframe → high-fidelity mock → redline spec → engineering handoff. Weeks of latency between intent and pixels.</p>'},
  {label:'With AI',html:'<p>Prompt → generated variants → AI critique → design-to-code scaffold → eval. Latency collapses to hours; the bottleneck moves to <em>judgment</em>.</p>'},
  {label:'+Quantum',html:'<p>Design search spaces (layout, pricing, routing) optimized combinatorially; the designer curates a Pareto frontier rather than a single comp.</p>'},
  {label:'+Robotics',html:'<p>Interfaces dissolve into ambient + embodied surfaces; the artifact is a <em>behavior policy</em>, not a screen.</p>'}
])}
${T('Operational excellence','Tim Cook','A learning resource that teaches craft while violating it is malpractice. Every token here is defensible. If you cannot justify a spacing value, delete it.')}
${D('Elon Musk','"You over-built the design system. Ship the three components that carry 90% of the content; the decision-tree component is vanity until a page needs it."')}
${GAP("Reverse-engineer this page's design tokens into a one-page token taxonomy (color/type/space/elevation). Present it as if defending it to a platform design council — that artifact alone is a Staff-level deliverable.")}
`);

/* ---------- MATURITY MODEL (DEEP) ---------- */
add('mat','Start','The UX Architect Maturity Model','Self-assess across 8 competencies × 5 levels',`
<p>Five levels — <strong>Practitioner → Senior → Staff → Principal → Distinguished/Architect</strong> — across eight competencies. Score yourself honestly; your two lowest scores are your roadmap. The model is the assessment spine the rest of the Bible plugs into.</p>
<div class="card" id="assessor"></div>
<h2>What distinguishes each level (behaviors + artifacts)</h2>
<table>
<tr><th>Competency</th><th>L1 Practitioner</th><th>L2 Senior</th><th>L3 Staff</th><th>L4 Principal</th><th>L5 Distinguished/Architect</th></tr>
<tr><td><b>Craft</b></td><td>Executes screens to spec</td><td>Owns a flow end-to-end; pixel + motion quality</td><td>Sets craft bar for a product area; reusable patterns</td><td>Defines craft standards used by others; invents patterns</td><td>Craft is industry-referenced; others cite your work</td></tr>
<tr><td><b>Research</b></td><td>Runs usability tests with a guide</td><td>Chooses methods; synthesizes to insight</td><td>Designs research programs; mixes quant+qual</td><td>Sets research strategy; ResearchOps at scale</td><td>Advances the methodology itself</td></tr>
<tr><td><b>Strategy</b></td><td>Understands the goal of a feature</td><td>Connects feature to a metric</td><td>Owns a north-star + tree for an area</td><td>Shapes product strategy with PM/Eng peers</td><td>Shapes company/portfolio strategy</td></tr>
<tr><td><b>Systems thinking</b></td><td>Uses the design system</td><td>Contributes components</td><td>Governs a system for a product</td><td>Architects multi-product token/governance model</td><td>Defines ecosystem coherence across 1B-user surfaces</td></tr>
<tr><td><b>Leadership</b></td><td>Leads self</td><td>Mentors 1–2; leads a project</td><td>Tech-leads a pod; raises others' bar</td><td>Leads leaders; sets team operating model</td><td>Builds the design org's culture & ladder</td></tr>
<tr><td><b>Communication</b></td><td>Presents own work clearly</td><td>Defends decisions with rationale</td><td>Persuades cross-functional peers</td><td>Influences VP/SVP; board-adjacent narrative</td><td>Sets the external narrative; industry voice</td></tr>
<tr><td><b>Business acumen</b></td><td>Knows the user</td><td>Knows the metric</td><td>Knows unit economics of the area</td><td>Reasons about P&L, moats, ROI</td><td>Reasons about market structure & bets</td></tr>
<tr><td><b>AI fluency</b></td><td>Uses AI tools for tasks</td><td>Designs AI features with patterns</td><td>Builds evals; designs agentic flows</td><td>Sets AI design strategy + safety posture</td><td>Defines new AI-UX primitives others adopt</td></tr>
</table>
${T('Growth mindset','Satya Nadella','The model is not a ranking of people; it is a map of learning. A Principal in Craft can be an L2 in Business Acumen — and naming that gap is the unlock, not the shame.')}
${D('Jensen Huang','"Levels lull you into linear thinking. AI fluency is not a column you climb slowly — it can jump you two levels in a quarter or make your hard-won craft level depreciate. Treat AI fluency as a multiplier on every other row, not a peer of them."')}
${GAP("Score yourself above, screenshot it, and re-score every quarter. For your two lowest competencies, the relevant pillar lists the exact drills. Bring the delta to your next performance conversation as evidence of trajectory — trajectory is what gets you promoted to Architect, not absolute level.")}
`);

/* ---------- PILLAR 11: INTERVIEW MASTERY (DEEP) ---------- */
add('p11','Pillars','P11 · Interview Mastery for UX Architects','150+ questions across four lenses, with model answers',`
<span class="tag">Pillar 11</span><span class="tag">Front-loaded</span><span class="tag">Anurag's priority</span>
<h1>Interview Mastery for UX Architects</h1>
<p>This pillar integrates every other pillar. You will be interviewed by four archetypes — CEO, CTO, Sr. VP, Senior Director — each probing a different axis. Every card below gives you: <em>what they're really testing · the trap · a 90-second model answer · the killer follow-up to ask back · red flags</em>. The model answers reference <strong>specific frameworks and metrics</strong> on purpose — generic answers are disqualifying at this level.</p>

<h2>The STAR-Plus framework (for behavioral answers)</h2>
<table>
<tr><th>Letter</th><th>Element</th><th>What strong leaders add</th></tr>
<tr><td>S</td><td>Situation</td><td>One sentence of context + the <em>stakes</em> (revenue, risk, users affected). Skip backstory.</td></tr>
<tr><td>T</td><td>Task</td><td>Your specific mandate and the constraint that made it hard.</td></tr>
<tr><td>A</td><td>Action</td><td>The decision and the <em>trade-off you chose</em> — not a task list. Name what you said no to.</td></tr>
<tr><td>R</td><td>Result</td><td>A number + a counterfactual ("vs. the prior baseline of X").</td></tr>
<tr><td>+R</td><td>Reflection</td><td>What you'd do differently — signals growth mindset, not defensiveness.</td></tr>
<tr><td>+R</td><td>Re-applicability</td><td>The transferable mechanism you now reuse — signals you built a system, not a one-off.</td></tr>
</table>
${T('Working backwards','Andy Jassy','The "Re-applicability" beat is what separates a Director from a Principal. A Director tells a good story; a Principal extracted a reusable mechanism from it. Always land on the mechanism.')}

<h2>Lens 1 — The CEO (business strategy, moats, board communication)</h2>
${q('CEO · why-hire archetype','Why should we hire you as our UX Architect over a strong internal promote?','Whether you think in terms of business outcomes and can articulate a unique wedge, not credentials.','Listing skills and past titles — interchangeable with any senior candidate.','"Three reasons. First, I close the design-to-business translation gap: at Providence I reframed clinician burnout from a satisfaction metric into a documentation-time-on-task problem and tied it to retention economics. Second, I operate at the seam of design, frontend, and AI — I can scaffold a prototype in Claude Code and defend its token architecture to your platform council. Third, I bring a vertical edge in regulated healthcare that maps to your expansion thesis. An internal promote gives you continuity; I give you a step-change in AI-era operating model with no ramp on craft."','"What\'s the single design decision in the next 12 months you\'d most regret getting wrong — and is that a craft, research, or strategy problem?"','Talking only about passion/fit; no business framing; no acknowledgment of why the internal candidate is credible.')}
${q('CEO · moats','How does design create a defensible moat versus a feature competitors can copy?','Whether you understand moats as systems (data, switching cost, network, brand) not pixels.','Claiming "great UX is the moat" — CEOs know polish is copyable.','"Pixels aren\'t a moat — copyable in a sprint. Design builds moats in four ways: it compounds a <em>data advantage</em> by designing the capture loop (every interaction that improves the model), raises <em>switching costs</em> through earned workflow muscle-memory, accelerates <em>network effects</em> by lowering the activation energy to invite others, and concentrates <em>brand</em> into a recognizable interaction signature. At Amazon the 1-Click patent was design-as-moat. My job is to pick which of those four we\'re building and design the flywheel deliberately, then measure it."','"Which of those four moats is the board underwriting in our current valuation — because that\'s where I\'d concentrate design investment?"','Confusing aesthetics with defensibility; no mention of flywheels, switching costs, or data loops.')}
${q('CEO · board comms','You have 5 minutes with the board. How do you make the case for design investment?','Executive narrative compression and financial literacy.','Showing portfolio screenshots to a board — wrong altitude.','"I open with the money, not the mocks: ‘We lose $X a year to a 32% checkout abandonment; benchmark is 18%. Closing half the gap is $Y in recovered revenue.\' Then one slide on the mechanism — the three friction points and the bet. Then the ask and the measure: ‘Fund two researchers and a design-systems engineer; I\'ll report the abandonment delta monthly.\' I never show a screen unless asked. Boards fund outcomes and de-risked bets, not craft."','"What\'s the board\'s current mental model of why we\'re underperforming — so I can either confirm it with data or respectfully reframe it?"','Leading with visuals; no dollar figures; no clear ask or measurement commitment.')}
${q('CEO · market positioning','How would you position our product\'s experience against the category leader?','Strategic differentiation and willingness to <em>not</em> compete head-on.','Proposing to out-feature the leader — a losing game for a challenger.','"You don\'t beat the leader by copying their surface — you re-segment. I\'d run a top-task analysis to find the job they serve adequately but not lovingly, then over-serve that job so completely we own a beachhead. Tesla didn\'t make a better Camry; it redefined the dashboard around one job. I\'d pick our wedge job, design an experience 10x better on that axis, and accept being worse on axes the wedge segment doesn\'t value — then expand."','"Who is the customer the leader is structurally unable to serve well because of their existing commitments?"','Feature-parity thinking; trying to win everywhere; no segmentation.')}
${q('CEO · revenue impact','How do you quantify design\'s ROI when so much is indirect?','Comfort with measurement and honesty about attribution.','Either over-claiming credit or shrugging that "design ROI can\'t be measured."','"I separate three tiers. Direct: A/B-attributable lifts — conversion, AOV, task completion — measured experimentally. Indirect: leading indicators like activation rate and time-to-value that correlate with retention. Strategic: avoided cost — support tickets deflected, dev rework prevented by a design system. I report the direct tier with confidence intervals, the indirect tier as correlation with a stated caveat, and the strategic tier as modeled estimates. Honesty about attribution is what earns the budget the next year."','"Does this org reward measurable conversion wins more than harder-to-attribute retention work — because that shapes where I\'d point the team?"','Single inflated ROI number; no attribution humility; no experimental method.')}
${q('CEO · risk','Tell me about a strategic bet that failed and what it cost.','Judgment under uncertainty and intellectual honesty.','Disguising a humblebrag as a failure.','[STAR-Plus] "We bet on a conversational interface for a clinical intake flow. Situation: intake took clinicians 6 minutes. Task: cut it in half. Action: I pushed a chat paradigm over a structured form — the wrong call. Result: completion dropped 14% because clinicians wanted scannable structure, not conversation; we reverted in 6 weeks, costing roughly a quarter of a squad. Reflection: I\'d fallen for a pattern because it was novel, not because the job demanded it. Re-applicability: I now gate every paradigm choice behind a top-task test before build. That mechanism has killed two bad ideas cheaply since."','"How does this org treat a well-reasoned bet that fails — is the postmortem about learning or blame? That tells me how aggressively I can innovate here."','A fake failure; blaming others; no cost named; no learning extracted.')}
${q('CEO · AI strategy','Where does AI change our business, and what\'s design\'s role?','Whether you see AI as strategy, not a feature checkbox.','Listing AI features ("we\'ll add a chatbot").','"AI changes us in three places: the <em>cost structure</em> of producing the experience, the <em>core value prop</em> if the product becomes agentic, and the <em>data flywheel</em>. Design\'s role is to own the trust surface — because the constraint on AI adoption is not capability, it\'s trust. The companies that win design the ‘show your work,\' graceful-degradation, and consent patterns that let users delegate confidently. I\'d make trust UI a P0, not a polish item."','"Is the ambition to bolt AI onto today\'s product or to let AI rewrite the core workflow — because those are different design org investments?"','Feature-list thinking; ignoring trust; treating AI as a layer not a strategy.')}
${q('CEO · competition','A well-funded startup is undercutting us on UX. Response?','Composure and structured competitive reasoning.','Panic-copying or dismissiveness.','"First I\'d separate signal from noise: are they winning customers or winning Twitter? I\'d instrument win/loss interviews. If real, I\'d find the <em>specific job</em> they nail and decide — defend (close the gap on our core segment fast) or redirect (cede that niche and double down where our scale is a moat they can\'t match: integrations, compliance, data). Startups beat incumbents on focus, not resources; my counter is to use our scale on axes focus can\'t buy."','"If we could only defend one customer segment from them, which one is most tied to our revenue — and are we sure?"','Emotional reaction; copying without segmenting; underestimating or panicking.')}
${q('CEO · vision','What\'s your 5-year vision for our product\'s experience?','Imagination disciplined by feasibility.','Pure sci-fi with no path, or timid extrapolation.','"In five years the interface mostly disappears for routine work — the product anticipates and acts, and the UI becomes the place you supervise and correct an agent, not operate a tool. Concretely: today\'s 12-step workflow becomes ‘confirm or adjust\' one screen. That demands three new design competencies we\'d build now — agent trust UI, eval-driven design, and ambient/multimodal patterns. The vision is bold; the investments are boring and start this quarter."','"What would have to be true about our data and trust posture for users to let us act on their behalf — and are we building toward that?"','Untethered futurism; or a vision that\'s just "more of the same, polished."')}
${q('CEO · leadership philosophy','What kind of design culture would you build here?','Whether your culture scales and aligns to business.','Generic "collaborative and user-centered" platitudes.','"A culture of <em>evidence and velocity</em>. Three norms: decisions are defended with the user job and a metric, not seniority; we ship to learn — a critique that doesn\'t change the work was a status meeting; and craft is non-negotiable but craft serves the outcome, not ego. I\'d operationalize it with a written critique format, a design-decision log, and a maturity ladder so growth is legible. Culture you can\'t write down doesn\'t survive your tenth hire."','"Where does the current culture create friction with engineering or product — because that seam is where I\'d focus first?"','Buzzwords; no operating mechanisms; culture that wouldn\'t survive scale.')}

<h2>Lens 2 — The CTO (technical depth, eng partnership, AI architecture)</h2>
${q('CTO · design-to-code','How do you make design-to-engineering handoff not lossy?','Whether you reduce ambiguity at the system level, not the ticket level.','Describing redlines and Figma specs — that\'s a 2018 answer.','"You eliminate handoff, not optimize it. The mechanism is a shared design system where tokens and components are the single source of truth in code — designers and engineers reference the same primitives. I push for design-system-as-code (Style Dictionary tokens → platform outputs), Storybook as the contract, and AI design-to-code to scaffold the first pass that engineers refine. Handoff is lossy because intent lives in a doc; my fix is to make intent live in shared, executable components. Specs are for the 10% the system doesn\'t cover."','"Where does our token pipeline break today — is it a tooling gap or a governance gap?"','Redline-centric thinking; treating handoff as a documentation problem.')}
${q('CTO · performance','Designers want richness; I have a performance budget. How do we resolve this?','Whether you treat performance as a design material.','Treating perf as engineering\'s problem to solve after design.','"Performance is a design constraint, like color contrast — I design within the budget, not against it. Concretely: I\'d adopt a perf budget per route (e.g., LCP < 2.5s, INP < 200ms), design with it as a first-class acceptance criterion, prefer system fonts and CSS over JS animation, lazy-load below the fold, and reserve richness for moments that earn it. Jank is a UX failure, not just an eng metric — a 100ms delay measurably drops engagement. I\'d rather ship a fast plain pattern than a beautiful slow one."','"What\'s our current INP and LCP at p75 on the critical flow — can I see the field data, not the lab data?"','Treating perf as someone else\'s job; richness without budget awareness.')}
${q('CTO · AI architecture','How should we architect the UX for an LLM feature so it\'s maintainable?','Whether you understand the stack: prompts, context, evals, latency, fallback.','Designing the chat bubble and ignoring the system behind it.','"The UX and the architecture are one system. I\'d insist on four things: a clear context strategy (what we put in the prompt and why — this is an interaction-design decision, e.g., MCP to pull live context); streaming UI so perceived latency stays low; graceful degradation when the model is uncertain or down (the ‘show your work\' + confidence pattern); and an eval harness so we measure UX quality, not just model accuracy. The maintainability risk is prompt sprawl — I\'d treat prompts as versioned design artifacts with owners."','"Do we have an eval set for the <em>experience</em>, or only for model accuracy — because a 95%-accurate model can still feel untrustworthy?"','Designing only the surface; no fallback, no evals, no latency strategy.')}
${q('CTO · platform thinking','Build a bespoke component or extend the platform?','Whether you optimize for the system, not the feature.','Always building bespoke for "the perfect experience."','"Default to the platform; deviate only with a documented reason and a plan to upstream. Bespoke components are debt with interest — every one fragments the system and multiplies maintenance. My rule: if the need is general, contribute it to the system so everyone benefits; if it\'s a genuine one-off justified by a high-value flow, build it but isolate and document it. The platform\'s coherence is worth more than any single screen\'s perfection."','"What\'s our current component reuse rate, and is there a governance path for me to contribute upstream — or does every team fork?"','Reflexive bespoke building; no awareness of system debt or governance.')}
${q('CTO · accessibility','Accessibility — nice-to-have or architecture?','Whether a11y is foundational or bolted on.','Treating WCAG as a final-stage checklist.','"Architecture. Bolting on a11y costs 5–10x more and never fully works. It\'s also frequently legal exposure (ADA, EN 301 549, the European Accessibility Act). I build semantic structure, focus management, and ARIA into the component layer once, so every feature inherits it. I\'d set WCAG 2.2 AA as the system contract, automate axe-core in CI, and pair it with manual screen-reader passes. Done at the system level it\'s nearly free; done per-feature it\'s a perpetual tax."','"Have we had an accessibility audit or complaint — because that tells me whether this is a remediation project or a greenfield standard?"','A11y as checklist; no automation; no legal awareness; per-feature retrofitting.')}
${q('CTO · engineering empathy','How do you keep design from being a bottleneck for fast eng teams?','Whether you can scale design without gatekeeping.','Insisting all work routes through design review.','"Bottlenecks come from design being a gate. I remove the gate by pushing decisions into the system: a robust component library plus clear usage guidelines means engineers self-serve 80% of UI correctly without me. I reserve design attention for the novel 20%. I also embed designers in pods rather than running a central queue. The goal is to make the right thing the easy default — then design scales sublinearly with eng headcount."','"What\'s the longest an engineering team has waited on design recently, and what were they blocked on?"','Gatekeeping; central queue; design as approval checkpoint.')}
${q('CTO · technical tradeoffs','When have you changed a design because of a technical constraint?','Pragmatism and respect for engineering reality.','Implying you never compromise the vision.','[STAR-Plus] "We wanted real-time collaborative editing on a clinical note. Eng flagged the conflict-resolution complexity and latency on our infra. Rather than fight it, I redesigned to a ‘sections lock\' model — coarser, but it shipped in a third of the time and clinicians actually preferred the predictability. Reflection: the ‘ideal\' was solving a problem users didn\'t have. Re-applicability: I now bring eng into the divergent phase, not the handoff phase, so constraints shape the concept early."','"Where do you see design currently spec\'ing things that are expensive relative to their user value?"','Designer-as-artist who won\'t compromise; or capitulating with no user reasoning.')}
${q('CTO · design systems','How do you govern a design system across many teams without slowing everyone?','Federated governance literacy.','Either total central control or total free-for-all.','"Federated model: a small core team owns the primitives, foundations, and contribution process; product teams own composition and can propose components via a documented RFC + review. The core team\'s job is curation and quality, not production. Versioning is semantic, breaking changes are deprecated with migration codemods, and adoption is measured. The failure mode at both extremes — central bottleneck or fork chaos — is solved by a clear contribution mechanism, not by control."','"Do we measure design-system adoption and override rate today — because overrides are the system telling us where it\'s failing?"','All-central or all-distributed; no contribution process; no adoption metric.')}
${q('CTO · prototyping','How technical should a designer be?','Self-aware positioning on the design-eng spectrum.','Over- or under-claiming engineering ability.','"Technical enough to be dangerous and credible — not to replace engineers. I prototype in real code (React/Tailwind) and scaffold with AI tools, which means my specs are feasible and my conversations with eng are concrete. But I respect the line: production architecture, performance, and security are theirs. The value of a technical designer is shrinking the intent-to-implementation gap and earning eng trust — not writing the merge-bound code."','"Would you rather designers here prototype in code or stay in Figma — what serves your teams\' velocity better?"','Claiming to be a full engineer, or proudly non-technical in an AI era.')}
${q('CTO · scale','How does designing for 100K users differ from 100M?','Systems and edge-case reasoning at scale.','Thinking it\'s just "more of the same."','"At 100M, the long tail <em>is</em> the product. A 0.1% edge case is 100K people; an a11y gap is a class-action. You stop designing for a persona and start designing for a distribution — locales, devices, network conditions, assistive tech, abuse vectors. You also can\'t hand-tune; you need a system and guardrails that produce good defaults at scale. And every change is an experiment because your gut doesn\'t generalize across 100M. The shift is from craft-by-hand to craft-by-system."','"What\'s our p99 user look like — slowest device, worst network, edge locale — and do we design for them or just the median?"','Linear scaling mindset; ignoring the long tail and experimentation.')}

<h2>Lens 3 — The Sr. VP (org design, scaling, P&L, multi-year roadmaps)</h2>
${q('SrVP · org design','How would you structure a 40-person design org?','Org-model fluency and matching structure to company stage.','Picking one model dogmatically.','"There\'s no universal answer — structure follows the operating model. For a multi-product company I\'d run a <em>federated</em> model: designers embedded in product pods for context and speed, with a dotted-line central craft+ops function owning the design system, research ops, hiring bar, and career ladder. Centralized risks ivory-tower irrelevance; fully embedded risks fragmentation and stalled careers. Federated captures both if the central function earns its keep with leverage — systems, tooling, calibration — rather than control. I\'d revisit the structure every time we double."','"How aligned are product and design on goals today — because misalignment there makes any org model fail?"','One-size dogma; no link between structure and company stage/strategy.')}
${q('SrVP · scaling','Design quality drops as the team grows. How do you prevent it?','Whether you can scale taste through systems, not heroics.','"Hire only great people" — doesn\'t scale or explain mechanism.','"Quality dilutes because taste doesn\'t scale by osmosis. I install three mechanisms: a written craft bar and design-principles doc so ‘good\' is legible; a regular calibrated critique where work is reviewed against that bar (calibration prevents drift); and a design system that encodes quality into defaults so the floor rises automatically. Plus a leveling rubric so feedback is consistent. Heroic individual taste is fragile; systematized taste compounds. Hiring well is necessary but insufficient."','"Is the quality drop in execution craft or in decision quality — because those need different interventions?"','Relying on hiring alone; no systems; treating quality as individual virtue.')}
${q('SrVP · cross-functional','How do you handle a powerful PM who overrides design decisions?','Political maturity and principled partnership.','Either capitulating or framing it as design-vs-PM warfare.','"I don\'t make it a turf war — I make it about evidence and shared goals. First I\'d understand their pressure; they\'re usually optimizing for a real constraint. I reframe from opinion-vs-opinion to ‘here\'s the user data and the metric risk.\' If we still disagree, I\'d propose a cheap test to let reality decide rather than escalate. I escalate only on principle (ethics, accessibility, a clear user-harm), and when I do, I do it transparently with the PM, not behind them. Repeated overrides are usually a goal-misalignment problem upstream — I\'d fix that with leadership."','"Where do product and design currently have misaligned incentives — because that\'s the root, not personalities?"','Capitulation; warfare framing; escalating without first seeking data or tests.')}
${q('SrVP · P&L','What do you understand about our P&L, and how does design touch it?','Business literacy at the executive altitude.','Pure user-advocacy with no financial grounding.','"Design touches both sides of the P&L. Revenue: conversion, AOV, retention/LTV, expansion — all design-influenced and partly attributable. Cost: support deflection through clearer UX, dev efficiency through a design system (real opex savings), and reduced churn-driven CAC pressure. In a regulated vertical like healthcare there\'s also avoided cost — error reduction, compliance, malpractice exposure. I\'d want to know our gross margin and primary growth lever so I point design at the highest-leverage line, not just the most fun problem."','"What\'s the single P&L line leadership most wants to move next year — margin, retention, or top-line growth?"','No financial vocabulary; design as a cost center with no revenue/cost linkage.')}
${q('SrVP · roadmap','How do you build a multi-year design roadmap?','Strategic sequencing under uncertainty.','A feature list with dates — that\'s a backlog, not a roadmap.','"A roadmap is a sequence of bets tied to outcomes, not a Gantt of features. I structure it in horizons: H1 (now–6mo) committed outcomes with metrics; H2 (6–18mo) directional bets we\'re de-risking with research; H3 (18mo+) themes and capability investments like AI design fluency or a re-platformed system. I sequence by dependency and leverage — foundational system work first because it unblocks everything downstream. And I hold it loosely; a multi-year roadmap that doesn\'t change is a fantasy. I review quarterly against reality."','"How much of leadership\'s expectation is fixed commitment versus directional — because over-promising H3 as H1 is how design loses credibility?"','Feature-and-date list; false precision; no horizons or dependency reasoning.')}
${q('SrVP · talent','What\'s your strategy for hiring and retaining senior design talent?','Talent-market realism and retention mechanics.','"Pay well and have good culture" — true but shallow.','"Hiring: I define the level rubric before sourcing so the bar is objective, use a portfolio + structured-case + craft exercise loop calibrated across interviewers to reduce bias, and sell the <em>problem</em>, not the perks — senior people are bought by scope and impact. Retention: senior designers leave when growth stalls or their work stops mattering. So I guarantee three things — a legible ladder to Principal/Distinguished, real scope (own an outcome, not a screen), and visible executive exposure. AI fluency is now a hiring axis; I screen for judgment with AI tools, not just figma craft."','"What\'s our regretted-attrition rate at senior levels, and do we know the real reasons from exit data?"','Perks-only retention; unstructured hiring; no leveling rubric; ignoring growth.')}
${q('SrVP · politics','Two senior directors are in conflict and it\'s slowing your org. What do you do?','Conflict resolution and decisiveness as a leader of leaders.','Avoiding it or taking a side emotionally.','"Unresolved peer conflict taxes the whole org, so I move fast. I meet each separately to understand the real interests beneath the positions — it\'s usually overlapping scope or misaligned goals, not personality. Then I bring them together around a shared objective and make the implicit explicit: who owns what decision (a RACI), and what the escalation path is. If it\'s genuinely irreconcilable on structure, that\'s my call to make — ambiguous ownership is a leadership failure, not theirs. I\'d rather make an imperfect decisive call than let ambiguity fester."','"Is this a personality clash or a structural ambiguity I created by not defining ownership clearly?"','Conflict avoidance; picking sides; no structural fix; letting it linger.')}
${q('SrVP · influence','How do you influence decisions outside your direct authority?','Leadership through influence, the core SrVP skill.','Relying on title or design authority.','"Authority is the weakest lever at this level; I lead through credibility, coalition, and framing. Credibility: I build a track record of called-shots that came true, so my judgment carries weight. Coalition: I find the partner who shares the goal — usually a PM or eng lead — and we arrive aligned. Framing: I translate design positions into the language of whoever I\'m persuading — revenue for the CEO, maintainability for the CTO, risk for legal. Influence is mostly pre-work done in 1:1s before the meeting, not eloquence in the meeting."','"Who are the three people whose buy-in actually determines whether design strategy succeeds here?"','Relying on authority; no coalition-building; one-language communication.')}
${q('SrVP · metrics','How do you measure your design org\'s performance to leadership?','Outcome accountability, not activity reporting.','Reporting outputs (screens shipped, tickets closed).','"I never report activity — I report outcomes across four tiers: business (revenue/retention/NPS moved), product (task success, adoption, time-to-value), team (velocity, quality, throughput), and people (growth, regretted attrition). I tie design initiatives to the business tier wherever attribution allows and am honest where it doesn\'t. A dashboard of ‘mockups delivered\' tells leadership design is a factory; a dashboard of outcomes tells them design is a business lever. The framing determines our budget."','"Which tier does leadership currently judge design on — because if it\'s activity, my first job is to re-educate on outcomes?"','Output metrics; vanity numbers; no business linkage; no attribution honesty.')}
${q('SrVP · change','You inherit a low-performing, demoralized design team. First 90 days?','Turnaround leadership.','Reorganizing on day one before understanding the system.','"Listen, stabilize, then change — in that order. First 30 days: 1:1 with everyone, audit the work, find the real constraint (often it\'s not talent — it\'s lack of clarity, broken partnership, or no decision rights). Quick wins to rebuild morale and credibility. Days 30–60: fix the highest-leverage broken mechanism — usually the design-PM-eng operating rhythm and unclear ownership. Days 60–90: install the durable systems — ladder, critique, principles — and make one visible bet pay off. Demoralized teams are usually starved of clarity and wins, not ability. I diagnose before I prescribe."','"Was the prior leader\'s problem strategy, execution, or politics — because I want to know what actually broke before I rebuild?"','Reorg-first; prescribing before diagnosing; blaming the team.')}

<h2>Lens 4 — The Senior Director (execution craft, team management, operating rhythm)</h2>
${q('SrDir · operating rhythm','Walk me through your team\'s weekly operating rhythm.','Whether you run a disciplined, legible team cadence.','Vague "we\'re agile and collaborate a lot."','"Monday: team sync to align on the week\'s outcomes and surface blockers — outcomes, not status. Mid-week: a calibrated design critique with a written format (problem, options, recommendation, decision needed) so it changes the work, not just shares it. Continuous: async design reviews in the tool with a 24h SLA so I\'m not a bottleneck. Weekly: my 1:1s, biweekly skip-levels. End of week: a short decision-log update so we have institutional memory. The rhythm exists to maximize decision velocity and minimize meeting load."','"Where does the current cadence create the most wasted time — too many meetings, or too few decisions made in them?"','No structure; meeting-heavy; critique with no decision; no async path.')}
${q('SrDir · critique','How do you run a design critique that actually improves work?','Whether critique is a craft mechanism or a popularity contest.','Open-floor reactions and subjective opinion.','"Critique fails when it\'s unstructured opinion. I anchor it: the presenter states the user job, the constraints, and the specific decision they want feedback on — not ‘what do you think.\' Feedback must reference the goal or a principle, framed as a question or an observation, not a directive. I separate ‘this violates a principle\' (objective) from ‘I\'d do it differently\' (preference) and label which is which. The output is a decision or a clear next step logged. Critique is for the work, never the person — and never a vote."','"Do critiques here currently end with a decision, or do they end and the designer guesses what to do next?"','Opinion free-for-all; no structure; design-by-committee; no decision output.')}
${q('SrDir · quality','How do you ensure design quality before it ships?','Practical QA discipline.','Relying on the designer to "just be good."','"Design QA is a discipline like code review. I use a pre-ship checklist covering the system contract (tokens/components used correctly), states (loading/empty/error/edge), responsive + density behavior, accessibility (contrast, focus, screen-reader pass), content quality, and the actual built experience versus the design — because the gap appears in implementation. I review the staged build, not just the Figma. The checklist makes quality consistent across the team rather than dependent on one person\'s vigilance, and it shifts QA earlier so we catch issues cheaply."','"Do we review the built experience or only the design file — because most quality loss happens in that gap?"','Quality as individual virtue; no checklist; reviewing only mockups not builds.')}
${q('SrDir · ambiguity','How do you help a designer stuck on an ambiguous problem?','Coaching versus rescuing.','Solving it for them (rescuing) or leaving them adrift.','"I coach, I don\'t rescue — rescuing creates dependence and robs growth. I\'d help them decompose the ambiguity: what do we actually know, what\'s the riskiest assumption, what\'s the smallest thing we could do to learn? Often ambiguity paralysis is fear of the wrong answer, so I lower the stakes — ‘make three rough cuts, we\'ll react to something concrete.\' Forward motion beats perfect planning on ambiguous problems. I match my involvement to their level: more scaffolding for a junior, just a sounding board for a senior."','"What\'s the riskiest assumption in this problem, and what\'s the cheapest way we could test it this week?"','Solving it for them; abstract advice; not adjusting to the designer\'s level.')}
${q('SrDir · feedback','How do you give difficult feedback to an underperformer?','Direct, caring management.','Either avoiding it or being harsh.','"Radical candor — care personally and challenge directly. I\'m specific and timely, not saving it for a review: the behavior, the impact, the expectation. ‘In the last three projects, the work shipped with unhandled error states, which created rework for eng — I need the edge cases owned before review.\' I make it about behavior and impact, never character, and I co-create a concrete improvement plan with a timeline so it\'s fair and actionable. Avoiding hard feedback isn\'t kind — it denies them the chance to improve and is unfair to the team carrying them."','"Has this person had clear, direct feedback before, or have they been managed around — because that changes whether it\'s a coaching or a clarity problem?"','Avoidance; vague feedback; character attacks; no improvement plan.')}
${q('SrDir · prioritization','Everything is urgent and the team is underwater. What do you do?','Prioritization and protecting the team.','Trying to do it all or pushing the team to burn out.','"‘Everything is a priority\' means nothing is — my job is to force the trade-off leadership won\'t. I make the work visible and rank it by impact-versus-effort against the actual business outcome, then I take the hard conversation upward: ‘we can do A and B well, or A, B, C, D poorly — which two matter most?\' I protect the team from thrash by being the filter, not the conduit. And I look for the systemic cause — chronic overload is usually under-staffing, scope creep, or design being a bottleneck I can fix with better defaults."','"If you could only get two of these shipped well this quarter, which two move the business most?"','Hero-mode; burning out the team; not escalating the prioritization decision.')}
${q('SrDir · growth','How do you develop a designer from mid to senior?','Whether you grow people deliberately.','Leaving growth to chance or osmosis.','"Deliberately, against the ladder. I name the specific gap between their current level and senior — usually it\'s not craft, it\'s scope, ambiguity-handling, and stakeholder influence. Then I engineer stretch: I give them an ambiguous problem to own end-to-end, put them in front of stakeholders with air cover, and debrief afterward. I pair the stretch with feedback tied to the rubric so growth is legible to them and to calibration. The mistake is promoting on tenure or craft alone — senior is about judgment and scope, and you have to manufacture the reps."','"What\'s the one capability — not task — that, if they nailed it, would make their promotion obvious to the calibration room?"','Growth by osmosis; promoting on tenure; no stretch reps; vague development.')}
${q('SrDir · stakeholders','A stakeholder rejects research findings they don\'t like. How do you handle it?','Diplomacy plus conviction.','Caving, or bludgeoning them with data.','"I get curious before I get defensive — rejection usually means the finding threatens a belief or a plan they\'re invested in. I separate the finding from the implication: ‘the data shows users miss this step — let\'s figure out what to do about it together\' invites them in rather than cornering them. I bring the user\'s voice directly (a clip beats a chart) because it\'s harder to argue with. If they still reject solid evidence, I propose a low-cost test so reality, not authority, settles it. I hold the finding firmly and the solution loosely."','"What outcome are you most worried this finding puts at risk — because maybe we can protect that and still act on the data?"','Caving on evidence; weaponizing data; making the stakeholder defensive.')}
${q('SrDir · systems','How do you decide when to invest in design-system work versus features?','Leverage reasoning at the execution level.','Always features (debt grows) or always system (no shipping).','"It\'s a leverage calculation, not a preference. I invest in the system when the same problem is being re-solved across teams (duplicated effort is the signal), when inconsistency is hurting users or velocity, or when upcoming roadmap work would compound on a shaky foundation. I treat system work as an enabler with its own ROI — ‘this token refactor saves every team N hours and unblocks the redesign.\' I avoid both failure modes: gold-plating a system nobody\'s blocked on, and accruing so much UI debt that every feature gets slower. I keep a debt log and pay it down deliberately."','"Where are teams currently re-solving the same UI problem — because that duplication is the clearest ROI signal for system investment?"','All-feature or all-system; no leverage/ROI framing; no debt tracking.')}
${q('SrDir · day-to-day','What does a great day of design management look like to you?','Self-awareness about the manager\'s real job.','Describing doing IC design work all day.','"A great day, I barely touch a Figma file — and that\'s the point. My job shifted from making the work to making the team that makes the work better. A great day: a 1:1 where someone has a breakthrough on a stuck problem; a critique that visibly levels up the work; unblocking a cross-functional snag before it costs a week; and removing one piece of friction from the system. I keep enough hands-on craft to stay credible and calibrated, but if I\'m the one designing, I\'m not doing my actual job — which is leverage through people and systems."','"How much IC work do directors here still carry — because that tells me whether the role is really management or a senior-IC-with-reports?"','Describing IC work; not understanding the leverage shift; no people focus.')}

${T('Empathy-led','Satya Nadella','Across all four lenses, the senior signal is the same: you make the implicit explicit and you reduce ambiguity for others. Juniors answer the question; architects reframe it to the real decision underneath.')}
${D('Elon Musk','"Most of these answers are too diplomatic. In a real room, sometimes the highest-status move is to say ‘that\'s the wrong question\' and redirect to physics. Calibrate — over-diplomacy reads as having no spine."')}
<h2>Portfolio presentation playbook</h2>
<table>
<tr><th>Format</th><th>Structure</th><th>Pacing</th></tr>
<tr><td>5-min (recruiter screen / hallway)</td><td>One case. Problem stakes → your decision → the trade-off → the number. Skip process.</td><td>~60s setup, 2m decision, 1m result, 1m what you\'d redo.</td></tr>
<tr><td>30-min (panel)</td><td>2 cases at different altitudes (one craft-deep, one strategy-deep). Arc: Context → Constraint → Decision → Trade-off → Outcome → Counterfactual.</td><td>Spend 60% on decisions and trade-offs, 20% on outcome, 20% on reflection. Never narrate every screen.</td></tr>
<tr><td>Written</td><td>Lead with the outcome and your role; then the decision narrative; appendix for artifacts. Skimmable headers.</td><td>The reader decides in 30 seconds whether to keep reading — front-load the impact.</td></tr>
</table>
<h4>Handling live pushback</h4>
<p>When challenged, don\'t defend — explore. "That\'s a fair challenge — here\'s the trade-off I was weighing, and here\'s what would change my mind." Showing the reasoning <em>behind</em> the decision beats defending the decision. Interviewers push to see if you collapse, calcify, or think. Aim to think out loud.</p>
${GAP("Record yourself answering five cards cold — one per lens plus one portfolio walkthrough — and watch it back against the red-flags column. Most senior candidates fail not on knowledge but on compression and altitude: answering a CEO question at IC altitude. Drill the altitude-match until it\'s automatic.")}
`);

add('p1','Pillars','P1 · UX Foundations & First Principles','The physics of perception and cognition',`
<span class="tag">Pillar 1</span><span class="tag">Foundations</span>
<h1>UX Foundations & First Principles</h1>
<p><b>Why it matters:</b> Every higher-order skill — strategy, systems, leadership — rests on whether you understand how humans actually perceive, decide, and err. These are not trivia; they are the load-bearing constraints of the medium, like gravity for an architect.</p>
<h2>The laws (cheat sheet)</h2>
<table>
<tr><th>Law</th><th>What it says</th><th>Design move</th></tr>
<tr><td>Hick's Law</td><td>Decision time grows with the number/complexity of choices</td><td>Progressive disclosure; sane defaults; chunking</td></tr>
<tr><td>Fitts's Law</td><td>Time to a target depends on its size and distance</td><td>Big tap targets; put primary actions where the cursor/thumb already is</td></tr>
<tr><td>Jakob's Law</td><td>Users expect your product to work like the others they know</td><td>Honor conventions; innovate only where it pays</td></tr>
<tr><td>Tesler's Law</td><td>Complexity is conserved — someone must absorb it</td><td>Move complexity from user to system, never delete the user's last sensible control</td></tr>
<tr><td>Postel's Law</td><td>Be liberal in what you accept, conservative in what you emit</td><td>Forgiving inputs (dates, formats); precise, predictable outputs</td></tr>
<tr><td>Peak-End Rule</td><td>Experiences are judged by their peak and their end</td><td>Engineer a peak moment and a clean ending; recovery from errors matters disproportionately</td></tr>
<tr><td>Miller / chunking</td><td>Working memory is ~4±1 chunks</td><td>Group, don't list 11 items flat</td></tr>
</table>
<h2>Mental models, affordances, signifiers</h2>
<p>Norman's vocabulary is non-negotiable fluency: <strong>affordances</strong> (what an object permits), <strong>signifiers</strong> (the cues that reveal it), <strong>mapping</strong> (control-to-effect correspondence), <strong>feedback</strong> (the system confirming it heard you), and <strong>conceptual models</strong> (the user's internal story of how it works). Most usability failure is a mismatch between the designer's model and the user's. <strong>Information scent</strong> (Pirolli) explains why people click — they follow the strongest cue toward their goal.</p>
${eraBlock([
 {label:'Before AI',html:'<p>Affordances were visual and static — a button looked clickable. Mapping was spatial.</p>'},
 {label:'With AI',html:'<p>Affordances become <em>linguistic and probabilistic</em>: "what can I ask?" replaces "what can I click?" The new signifier problem is teaching users an open-ended system\'s capabilities (the blank-prompt problem). Feedback must now express <em>uncertainty</em>.</p>'},
 {label:'+Quantum',html:'<p>Systems present optimized option sets; the affordance becomes "which of these computed frontiers do you prefer," and mapping is to outcomes, not controls.</p>'},
 {label:'+Robotics',html:'<p>Affordances become physical and behavioral — what will the embodied agent do, and how do I signal stop/override? Feedback is motion and sound, not pixels.</p>'}
])}
${T('First principles','Elon Musk','Don\'t cargo-cult patterns. Ask what the user is physically trying to accomplish and what the irreducible steps are. Most UI is accumulated convention; delete a step before you style it.')}
${D('Tim Cook','"First principles can become an excuse to ignore convention. Jakob\'s Law is physics too — users carry decades of learned behavior. Re-deriving the steering wheel wastes the user\'s cognition to flatter the designer\'s."')}
${GAP("Take one flow you own and annotate every element as affordance/signifier/feedback/mapping. Find the one place your conceptual model and the user's diverge — that gap is almost certainly your top usability issue. Write the fix as a one-page first-principles teardown.")}
`);

add('p2','Pillars','P2 · Design Thinking Process','Six methodologies, one meta-framework',`
<span class="tag">Pillar 2</span>
<h1>Design Thinking Process</h1>
<p>Six canonical processes solve different problems. Mastery is knowing which to reach for, not defending one.</p>
<div class="matrix-wrap"><table>
<tr><th>Dimension</th><th>Double Diamond (IDEO)</th><th>d.school</th><th>IBM EDT</th><th>Google Sprint</th><th>Amazon Working-Backwards</th><th>NVIDIA Sim-first</th></tr>
<tr><td>Core idea</td><td>Diverge/converge ×2</td><td>Empathize→Test</td><td>Loop+Hills+Playbacks</td><td>5-day decision</td><td>PR/FAQ before build</td><td>Simulate before real</td></tr>
<tr><td>Time horizon</td><td>Weeks–months</td><td>Flexible</td><td>Continuous</td><td>5 days</td><td>Days (doc)</td><td>Continuous</td></tr>
<tr><td>Team size</td><td>Small–med</td><td>Small</td><td>Scales to enterprise</td><td>5–7</td><td>2-pizza</td><td>Eng-heavy</td></tr>
<tr><td>Key deliverable</td><td>Validated concept</td><td>Tested prototype</td><td>Hills + playbacks</td><td>Tested prototype</td><td>PR/FAQ doc</td><td>Validated sim</td></tr>
<tr><td>Risk profile</td><td>Reduces wrong-problem</td><td>Reduces desirability</td><td>Reduces alignment</td><td>Reduces build-wrong</td><td>Reduces value</td><td>Reduces feasibility</td></tr>
<tr><td>AI compatibility</td><td>High (synthesis)</td><td>High</td><td>High</td><td>Very high (gen variants)</td><td>Very high (draft FAQ)</td><td>Native</td></tr>
<tr><td>Best for</td><td>Ambiguous problems</td><td>Human-centered new products</td><td>Large orgs, alignment</td><td>Fast de-risking</td><td>Clarity of value</td><td>Complex/physical systems</td></tr>
</table></div>
<h3>Meta-framework: DISCOVER · DECIDE · DELIVER · DEFEND</h3>
<p>Synthesis across all six: <strong>Discover</strong> the real problem (Double Diamond's first diamond + empathy), <strong>Decide</strong> the bet and write it down before building (Working-Backwards + Sprint), <strong>Deliver</strong> via the lightest validation that de-risks the biggest unknown (Sprint prototype / sim), <strong>Defend</strong> with playbacks and metrics (IBM EDT). Pick the unknown that would kill you and attack it first.</p>
${T('Working backwards','Andy Jassy','If you can\'t write a crisp press release and FAQ for the experience, you don\'t understand it yet. The PR/FAQ is a thinking tool that kills weak ideas before they cost engineering a quarter.')}
${D('Jensen Huang','"Documents are for people; simulations are for reality. For anything physical or systemic, a written FAQ lies confidently — you need to simulate the experience under load before you trust it."')}

<h2>The NN/g design-process lineage</h2>
<p>Nielsen Norman Group frames the process as a continuous, non-linear loop rather than a tidy funnel. Their canonical articulation — <strong>Understand → Specify → Design → Evaluate</strong> wrapped around the <em>Discovery → Definition → Design → Delivery</em> arc — maps cleanly onto the Double Diamond but adds NN/g's discipline: every phase is evidence-driven, and you loop back the moment evidence contradicts an assumption. NN/g's enduring contributions you should be able to cite by name: the <strong>UX research methods landscape</strong> (attitudinal↔behavioral × qualitative↔quantitative × context of use), the <strong>"why &amp; what to use when"</strong> method-selection logic, the insistence that <em>discovery is not optional</em>, and the warning against "design theater" — process performed for show without changing decisions.</p>
<table>
<tr><th>NN/g phase</th><th>Core question</th><th>Primary methods</th><th>Exit criterion</th></tr>
<tr><td>Discovery</td><td>Are we solving a real problem?</td><td>Field studies, interviews, diary studies, competitive review</td><td>A validated problem statement</td></tr>
<tr><td>Definition / Specify</td><td>For whom, and what does success mean?</td><td>Personas, JTBD, journey maps, success metrics</td><td>Agreed target + measurable outcome</td></tr>
<tr><td>Design / Ideate-Prototype</td><td>What solution best fits?</td><td>Sketching, IA (card sort/tree test), prototyping</td><td>A testable artifact</td></tr>
<tr><td>Evaluate / Deliver</td><td>Did it work? Iterate.</td><td>Usability testing, heuristic eval, analytics, RITE</td><td>Evidence of task success → ship or loop</td></tr>
</table>

<h2>Full method-family comparison (across the six processes)</h2>
<div class="matrix-wrap"><table>
<tr><th>Dimension</th><th>Double Diamond</th><th>d.school 5-stage</th><th>NN/g loop</th><th>IBM EDT</th><th>Google Sprint</th><th>Working-Backwards</th></tr>
<tr><td>Shape</td><td>Diverge/converge ×2</td><td>Linear-ish, iterative</td><td>Continuous loop</td><td>Loop + Hills + Playbacks</td><td>Time-boxed funnel</td><td>Doc-first, backwards</td></tr>
<tr><td>Entry artifact</td><td>Brief</td><td>Empathy data</td><td>Research question</td><td>Hills (intent statements)</td><td>Challenge</td><td>Blank PR/FAQ</td></tr>
<tr><td>Evidence emphasis</td><td>Medium</td><td>High (empathy)</td><td>Very high</td><td>High (alignment)</td><td>Medium (1 test)</td><td>Low until built</td></tr>
<tr><td>Org scale fit</td><td>Agency/product</td><td>Education/startups</td><td>Any, research-led</td><td>Enterprise</td><td>Small squad</td><td>Amazon-style</td></tr>
<tr><td>Failure mode</td><td>Over-diverging</td><td>Empathy without delivery</td><td>Analysis paralysis</td><td>Playback theater</td><td>5-day false confidence</td><td>Fiction-writing</td></tr>
</table></div>

<h2>The design process WITH AI (phase by phase)</h2>
${eraBlock([
 {label:'Discovery',html:'<p><strong>Before:</strong> weeks of recruiting, interviewing, manual affinity-mapping. <strong>With AI:</strong> Claude clusters transcripts and competitive corpora in minutes and drafts the problem statement; you spend your time <em>choosing the question</em> and <em>verifying</em> themes rather than coding stickies. New risk: AI invents a tidy theme that isn\'t in the data — never let it fabricate a quote, always trace back to source.</p>'},
 {label:'Define',html:'<p><strong>With AI:</strong> generate persona and JTBD drafts from real research, then pressure-test them ("what would falsify this persona?"). The metric tree can be drafted by AI but the <em>choice</em> of north-star stays human — it encodes values.</p>'},
 {label:'Ideate',html:'<p><strong>With AI:</strong> the cost of a divergent option drops to near-zero — Figma Make / Google Stitch / Claude Artifacts spit out dozens of variants. The bottleneck moves entirely to <em>convergence judgment</em>. Crazy-8s becomes Crazy-80; your skill is the rubric that kills 78 of them.</p>'},
 {label:'Prototype',html:'<p><strong>With AI:</strong> prompt-to-working-prototype (real code) compresses days to minutes. You test interactive fidelity in the first session instead of the fifth. See P5\'s AI-native tooling section.</p>'},
 {label:'Evaluate',html:'<p><strong>With AI:</strong> synthesis of usability sessions and open-ended survey text is automated; AI can flag heuristic violations as a first pass. But AI cannot watch a human struggle and feel the friction — moderated observation stays human.</p>'}
])}
${T('AI-first','Sundar Pichai','The process doesn\'t get shorter — it gets deeper. When generating ten prototypes costs nothing, the differentiator is the quality of the question you ask and the rubric you converge with. Process discipline matters more in the AI era, not less.')}
${D('Andy Jassy','"Beware AI-accelerated divergence. Generating 80 concepts cheaply tempts teams to skip the hard work of deciding. Working-Backwards still wins: write the PR/FAQ first, and most of those 80 die before you waste a prototype on them."')}
${GAP("Run a Working-Backwards PR/FAQ and a 5-day Sprint on the same problem. Notice what each surfaces that the other misses. Add the comparison to your portfolio as evidence you select methods deliberately.")}
`);

add('p3','Pillars','P3 · UX Research','25+ methods, bias inventory, ethics at scale',`
<span class="tag">Pillar 3</span>
<h1>UX Research</h1>
<p>Research splits two ways: <strong>generative</strong> (what should we build? — interviews, diary studies, ethnography, contextual inquiry, JTBD) versus <strong>evaluative</strong> (did we build it right? — usability tests, A/B, tree testing). And <strong>qual</strong> (why) versus <strong>quant</strong> (how many). Method choice follows the question, not habit.</p>
<h3>Method catalog (selected from 25+)</h3>
<div class="pill-list"><ul>
<li>Discovery / depth interviews</li><li>JTBD switch interviews</li><li>Diary & experience sampling</li><li>Ethnography / field study</li><li>Contextual inquiry</li><li>Card sorting (open/closed)</li><li>Tree testing</li><li>First-click testing</li><li>Surveys (attitudinal)</li><li>Kano model</li><li>Top-task analysis</li><li>Analytics & funnels</li><li>Heatmaps / session replay</li><li>A/B & multivariate testing</li><li>Usability testing (mod/unmod)</li><li>RITE</li><li>Heuristic evaluation</li><li>Cognitive walkthrough</li><li>Desirability testing</li><li>Concept testing</li><li>Longitudinal cohort analysis</li><li>Benchmark studies</li><li>Tree/IA validation</li><li>Five-second tests</li><li>Eye-tracking</li></ul></div>
<h3>Bias inventory</h3>
<p>Every study leaks bias unless designed against it: <strong>confirmation</strong> (you find what you seek), <strong>sampling</strong> (who you didn\'t recruit), <strong>social desirability</strong> (users tell you what flatters you), <strong>leading questions</strong>, <strong>recency/primacy</strong>, <strong>observer effect</strong>, and <strong>survivorship</strong> (you only hear from those who stayed). Counter-moves: open non-leading questions, behavior over opinion, triangulation across methods, and pre-registering what would change your mind.</p>
${eraBlock([
 {label:'Before AI',html:'<p>Synthesis was manual affinity mapping over days; sample sizes limited by recruiting and analysis cost.</p>'},
 {label:'With AI',html:'<p>AI (e.g. Claude) clusters transcripts, surfaces themes, and drafts synthesis in minutes — but <em>hallucinated themes and false confidence</em> are the new bias. The researcher\'s job shifts from coding to <em>verifying</em> and to designing the questions. Never let AI invent a quote.</p>'},
 {label:'+Quantum',html:'<p>Massive multivariate behavioral spaces become tractable; you can model preference landscapes rather than test a handful of variants.</p>'},
 {label:'+Robotics',html:'<p>Research includes physical telemetry from embodied products — observation becomes continuous sensor data, raising fresh consent questions.</p>'}
])}
${NOTE("<b>Ethics & compliance:</b> IRB-style consent, GDPR (lawful basis, right to erasure), and HIPAA (PHI never in research tooling without a BAA) are not legal's problem — they're design constraints. In healthcare, recording a patient session without proper consent isn't a bad practice, it's a violation.")}
${T('Privacy as primitive','Tim Cook','Research that harvests more data than the question requires is a liability, not an asset. Collect the minimum, anonymize by default, and design the consent moment with the same care as the product.')}
${GAP("Build a one-page research plan for a real question you face: state the decision it informs, the method and why, sample and recruiting, the bias you're most exposed to and your counter-move, and the consent/compliance posture. A Staff researcher's plans read like this.")}
`);
